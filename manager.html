*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
:root{--black:#0a0a0a;--ch:#141414;--ch2:#1c1c1c;--ch3:#242424;--gold:#c9a84c;--gl:#e2c97e;--gd:rgba(201,168,76,0.15);--green:#4caf7d;--yellow:#e6b84a;--red:#e05c5c;--text:#f0ece4;--dim:#9a9488;--border:rgba(201,168,76,0.2);--ff:"Cormorant Garamond",serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Montserrat',sans-serif;font-weight:300;color:var(--text);background:var(--black);}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
#screen::-webkit-scrollbar{width:3px;}
#screen::-webkit-scrollbar-thumb{background:var(--gd);}
.topbar{background:var(--ch);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:var(--ff);font-size:22px;letter-spacing:2px;color:var(--gl);}
.topbar-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gd);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);cursor:pointer;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:22px;line-height:1;padding:0;margin-right:12px;}
.sc{flex:1;padding:20px;}
.bnav{background:var(--ch);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;color:var(--dim);font-size:8px;letter-spacing:1px;text-transform:uppercase;gap:4px;border:none;background:none;}
.ni.active{color:var(--gold);}
.ni span{font-size:16px;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:1px;color:#000;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:8px;}
.btn-outline{width:100%;background:transparent;border:1px solid var(--gold);border-radius:1px;color:var(--gl);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:8px;}
.btn-ghost{width:100%;background:transparent;border:1px solid var(--border);border-radius:1px;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:11px;cursor:pointer;margin-top:8px;}
.sec{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;margin-top:4px;}
.card{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:10px;}
.card.tap{cursor:pointer;transition:border-color .2s;}
.card.tap:hover{border-color:var(--gold);}
.cat-ico{width:38px;height:38px;border-radius:50%;background:var(--gd);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pbar-wrap{background:var(--ch3);border-radius:10px;height:5px;margin-top:6px;overflow:hidden;}
.pbar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--gl));}
.lbl{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.inp{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:300;padding:12px 16px;margin-bottom:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--gold);}
.sel{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;padding:12px;margin-bottom:14px;outline:none;}
.pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ch);border:1px solid var(--gold);border-radius:2px;padding:10px 20px;font-size:11px;color:var(--gl);z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.toggle{width:44px;height:24px;border-radius:12px;border:1px solid var(--border);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;transition:transform .2s;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.color-swatch.selected{border-color:#fff;}
</style>

// ── CORE HELPERS ─────────────────────────────────────────────────────────────
function render(html){
  document.getElementById('screen').innerHTML=html;
  document.querySelectorAll('[data-back]').forEach(function(el){
    el.addEventListener('click',function(){var fn=this.getAttribute('data-back');if(fn&&window[fn])window[fn]();});
  });
  document.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-action');
      if(a==='estate') goEstateDetail(this.getAttribute('data-id'));
      else if(a==='client') goClientDetail(this.getAttribute('data-id'));
      else if(a==='inspector') goInspectorDetail(this.getAttribute('data-id'));
      else if(a==='nav'){var fn=this.getAttribute('data-fn');if(fn&&window[fn])window[fn]();}
    });
  });
  // Inspector switch cards
  document.querySelectorAll('[data-switchid]').forEach(function(el){
    el.addEventListener('click',function(){doSwitchToInspectorById(this.getAttribute('data-switchid'));});
  });
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function ff(label,type,id,ph,val){return '<div class="lbl">'+label+'</div><input class="inp" type="'+type+'" id="'+id+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'">';}
function fs(label,id,opts){return '<div class="lbl">'+label+'</div><select class="sel" id="'+id+'">'+opts+'</select>';}

function liveScore(e){var all=[];Object.values(e.data).forEach(function(c){all=all.concat(c.points);});return scoreOf(all);}
function scoreOf(pts){var g=0,y=0,r=0,t=pts.length;pts.forEach(function(p){if(p.status==='green')g++;else if(p.status==='yellow')y++;else if(p.status==='red')r++;});return{score:t>0?Math.round(((g*2+y)/(t*2))*100):0,green:g,yellow:y,red:r,total:t};}

function statBox(label,val,icon,color,fn){
  var cls=fn?'card tap':'card';
  var click=fn?' onclick="'+fn+'"':'';
  return '<div class="'+cls+'"'+click+' style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between">'
    +'<div><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">'+label+'</div>'
    +'<div style="font-size:22px;font-family:var(--ff);color:'+(color||'var(--gl)')+';margin-top:3px">'+val+'</div></div>'
    +(fn?'<div style="font-size:15px;color:'+(color||'var(--gold)')+';opacity:.7">&#8250;</div>':'')
    +'</div>';
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function goDash(){
  var activeClients=clients.length;
  var activeInspectors=inspectors.length;
  var mtdRevenue=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getMonth()===new Date().getMonth();}).reduce(function(s,i){return s+i.amount;},0);
  var unpaidTotal=allInvoices.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);

  var html=topBar(tenantConfig.companyName,'Manager Dashboard')
    +'<div class="sc">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">'
    +statBox('Active Clients',activeClients,null,null,'goTeam(\'clients\')')
    +statBox('Inspectors',activeInspectors,null,null,'goTeam(\'inspectors\')')
    +statBox('This Month Revenue','$'+mtdRevenue.toLocaleString('en',{maximumFractionDigits:0}),null,'var(--green)','goFinancials()')
    +statBox('Unpaid Invoices','$'+unpaidTotal.toLocaleString('en',{maximumFractionDigits:0}),null,unpaidTotal>0?'var(--red)':'var(--green)','goInvoices(\'unpaid\')')
    +'</div>';

  // Today's schedule
  var todayStr=new Date().toDateString();
  var todayItems=scheduleItems.filter(function(s){return new Date(s.date).toDateString()===todayStr;});
  html+='<div class="sec">Today\'s Schedule</div>';
  if(!todayItems.length){
    html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:16px;background:var(--ch2);border:1px solid var(--border);border-radius:2px;margin-bottom:16px">No inspections scheduled today</div>';
  } else {
    todayItems.forEach(function(s){
      var e=estates.find(function(x){return x.id===s.estateId;});
      var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
      if(!e) return;
      var isDone=s.status==='completed';
      var timeStr=new Date(s.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      html+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+(isDone?'var(--green)':'var(--gold)')+'">'
        +'<div class="cat-ico">'+e.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+' &nbsp;&#183;&nbsp; '+(isDone?'Completed '+timeStr:timeStr)+'</div></div>'
        +'<div style="font-size:9px;color:'+(isDone?'var(--green)':'var(--gold)')+';text-transform:uppercase;letter-spacing:1px;white-space:nowrap">'+(isDone?'Done':'Scheduled')+'</div>'
        +'</div>';
    });
  }

  // Quick access grid
  html+='<div class="sec" style="margin-top:16px">Quick Access</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">'
    +qaCard('Clients','goTeam(\'clients\')',ICO_CLIENTS)
    +qaCard('Inspectors','goTeam(\'inspectors\')',ICO_INSPECTORS)
    +qaCard('Estates','goEstates()',ICO_ESTATES)
    +qaCard('Invoices','goInvoices()',ICO_INVOICES)
    +qaCard('Schedule','goSchedule()',ICO_SCHEDULE)
    +qaCard('Company Profile','goCompanyProfile()',ICO_PROFILE)
    +'</div>';

  // Switch to inspector mode
  html+='<div class="card tap" onclick="switchToInspectorMode()" style="display:flex;align-items:center;justify-content:space-between;border-color:var(--gold);background:rgba(201,168,76,.06);margin-bottom:8px">'
    +'<div style="font-size:11px;color:var(--gl)">Switch to Inspector Mode</div>'
    +'<div style="font-size:16px;color:var(--gold)">&#8250;</div>'
    +'</div>'
    +'<button class="btn-ghost" onclick="doSignOut()">Sign Out</button>'
    +'</div>'+nav('dash');
  render(html);
}

function qaCard(label,fn,icon){

    +'<div style="font-size:11px;color:var(--text)">'+label+'</div>'

}

function switchToInspectorMode(){
  if(!inspectors.length){showToast('No inspectors on your team yet');return;}
  // If only one inspector, go directly
  if(inspectors.length===1){doSwitchToInspector(inspectors[0]);return;}
  // Multiple inspectors — show picker
  var html=topBar('Inspector Mode','Select Inspector','goDash')
    +'<div class="sc">'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:16px">Select which inspector profile to work as. Return to Manager Dashboard at any time from Settings.</div>';
  inspectors.forEach(function(insp){
    var assigned=estates.filter(function(e){return e.contract&&e.contract.assignedInspector===insp.id;});
    html+='<div class="card tap" data-switchid="'+insp.id+'" style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'
      +'<div class="avatar" style="cursor:default">'+insp.initials+'</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+insp.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+insp.email+'</div>'
      +'<div style="font-size:9px;color:var(--gold);margin-top:2px">'+assigned.length+' estate'+(assigned.length===1?'':'s')+' assigned</div></div>'
      +'<div style="font-size:18px;color:var(--gold)">&#8250;</div>'
      +'</div>';
  });
  html+='<button class="btn-ghost" onclick="goDash()">Cancel</button>'
    +'</div>'+nav('dash');
  render(html);
}

function doSwitchToInspectorById(id){
  var insp=inspectors.find(function(i){return i.id===id;});
  doSwitchToInspector(insp);
}

function doSwitchToInspector(insp){
  if(!insp) return;
  var inspUser={email:insp.email,role:'inspector',name:insp.name,initials:insp.initials,phone:insp.phone,managerMode:true,managerEmail:currentUser.email};
  localStorage.setItem('ec_inspector_return',JSON.stringify(currentUser));
  localStorage.setItem('ec_user',JSON.stringify(inspUser));
  window.location.href=base+'inspector.html';
}

// ── FINANCIALS ────────────────────────────────────────────────────────────
function goFinancials(){
  var now=new Date();
  var thisMonth=now.getMonth(),thisYear=now.getFullYear();
  var lastMonth=thisMonth===0?11:thisMonth-1;
  var lastMonthYear=thisMonth===0?thisYear-1:thisYear;

  var mtd=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getMonth()===thisMonth&&new Date(i.paidDate).getFullYear()===thisYear;}).reduce(function(s,i){return s+i.amount;},0);
  var lastMonthTotal=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getMonth()===lastMonth&&new Date(i.paidDate).getFullYear()===lastMonthYear;}).reduce(function(s,i){return s+i.amount;},0);
  var trend=lastMonthTotal>0?Math.round(((mtd-lastMonthTotal)/lastMonthTotal)*100):0;
  var ytd=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getFullYear()===thisYear;}).reduce(function(s,i){return s+i.amount;},0);
  var avgPerClient=clients.length>0?(ytd/clients.length):0;

  var paidThisMonth=mtd;
  var unpaidTotal=allInvoices.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);
  var upcoming30=allInvoices.filter(function(i){return i.status==='upcoming';}).reduce(function(s,i){return s+i.amount;},0);

  // Revenue by tier
  var tierTotals={};
  allInvoices.filter(function(i){return i.status==='paid';}).forEach(function(i){
    var e=estates.find(function(x){return x.id===i.estateId;});
    var tier=e&&e.contract?e.contract.tier:'Other';
    tierTotals[tier]=(tierTotals[tier]||0)+i.amount;
  });
  var maxTier=Math.max.apply(null,Object.values(tierTotals).concat([1]));

  var html=topBar('Financials','Revenue Overview','goDash')
    +'<div class="sc">'
    +'<div class="card" style="border-color:var(--gold);margin-bottom:14px">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Month to Date</div>'
    +'<div style="font-family:var(--ff);font-size:32px;color:var(--gl)">$'+mtd.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div>'
    +(lastMonthTotal>0?'<div style="font-size:10px;color:'+(trend>=0?'var(--green)':'var(--red)')+';margin-top:6px">'+(trend>=0?'&#9650;':'&#9660;')+' '+Math.abs(trend)+'% vs last month</div>':'')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    +'<div class="card" style="padding:12px"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Year to Date</div><div style="font-size:18px;color:var(--text);margin-top:4px">$'+ytd.toLocaleString('en',{maximumFractionDigits:0})+'</div></div>'
    +'<div class="card" style="padding:12px"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Avg / Client</div><div style="font-size:18px;color:var(--text);margin-top:4px">$'+avgPerClient.toFixed(0)+'</div></div>'
    +'</div>'
    +'<div class="sec">Invoice Status</div>'
    +'<div class="card tap" onclick="goInvoices(\'paid\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><div style="font-size:12px">Paid this month</div></div>'
    +'<div style="font-size:13px;color:var(--green);font-weight:500">$'+paidThisMonth.toFixed(2)+'</div></div>'
    +'<div class="card tap" onclick="goInvoices(\'unpaid\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;border-color:'+(unpaidTotal>0?'var(--red)':'var(--border)')+'">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div><div style="font-size:12px">Unpaid</div></div>'
    +'<div style="font-size:13px;color:var(--red);font-weight:500">$'+unpaidTotal.toFixed(2)+'</div></div>'
    +'<div class="card tap" onclick="goInvoices(\'upcoming\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></div><div style="font-size:12px">Upcoming (30 days)</div></div>'
    +'<div style="font-size:13px;color:var(--gold);font-weight:500">$'+upcoming30.toFixed(2)+'</div></div>'
    +'<div class="sec">Revenue by Service Tier</div>'
    +'<div class="card" style="margin-bottom:16px">';

  Object.keys(tierTotals).forEach(function(tier){
    var pct=Math.round((tierTotals[tier]/maxTier)*100);
    html+='<div style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:11px;color:var(--text)">'+tier+'</div><div style="font-size:11px;color:var(--text)">$'+tierTotals[tier].toFixed(0)+'</div></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+pct+'%"></div></div>'
      +'</div>';
  });

  html+='</div>'
    +'<div class="card tap" onclick="goInvoices()" style="display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-size:11px;color:var(--gl)">View All Invoices</div><div style="font-size:14px;color:var(--gold)">&#8250;</div>'
    +'</div>'
    +'</div>'+nav('billing');
  render(html);
}

// ── TEAM (Clients + Inspectors) ──────────────────────────────────────────
function goTeam(tab){
  tab=tab||'clients';
  var html=topBar('Team',clients.length+' Clients &nbsp;&#183;&nbsp; '+inspectors.length+' Inspectors','goDash')
    +'<div class="sc">'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
    +'<button onclick="goTeam(\'clients\')" style="flex:1;background:'+(tab==='clients'?'var(--gd)':'transparent')+';border:1px solid '+(tab==='clients'?'var(--gold)':'var(--border)')+';border-radius:2px;color:'+(tab==='clients'?'var(--gl)':'var(--dim)')+';font-family:Montserrat,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer">Clients</button>'
    +'<button onclick="goTeam(\'inspectors\')" style="flex:1;background:'+(tab==='inspectors'?'var(--gd)':'transparent')+';border:1px solid '+(tab==='inspectors'?'var(--gold)':'var(--border)')+';border-radius:2px;color:'+(tab==='inspectors'?'var(--gl)':'var(--dim)')+';font-family:Montserrat,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer">Inspectors</button>'
    +'</div>';

  if(tab==='clients'){
    clients.forEach(function(c){
      var e=estates.find(function(x){return x.id===c.estateId;});
      var sc=e?liveScore(e):{score:0};
      html+='<div class="card tap" data-action="client" data-id="'+c.email+'" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div class="avatar" style="cursor:default">'+c.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase()+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+c.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(e?e.name:'No estate')+'</div></div>'
        +(e?'<div style="font-family:var(--ff);font-size:18px;color:var(--gl)">'+sc.score+'%</div>':'')
        +'</div>';
    });
  } else {
    html+='<button class="btn-outline" onclick="goAddInspector()" style="margin-bottom:14px">+ Add Inspector</button>';
    inspectors.forEach(function(insp){
      var assigned=estates.filter(function(e){return e.contract&&e.contract.assignedInspector===insp.id;});
      html+='<div class="card tap" data-action="inspector" data-id="'+insp.id+'" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div class="avatar" style="cursor:default">'+insp.initials+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+insp.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+insp.email+'</div>'
        +'<div style="font-size:9px;color:var(--gold);margin-top:3px">'+assigned.length+' estate'+(assigned.length===1?'':'s')+' assigned</div></div>'
        +'<div style="font-size:14px;color:var(--gold)">&#8250;</div>'
        +'</div>';
    });
  }

  html+='</div>'+nav('team');
  render(html);
}

function goClientDetail(email){
  var c=clients.find(function(x){return x.email===email;});
  if(!c) return;
  var e=estates.find(function(x){return x.id===c.estateId;});
  var sc=e?liveScore(e):null;
  var clientInv=allInvoices.filter(function(i){return i.clientEmail===email;});

  var html=topBar(c.name,'Client Profile','goTeam')
    +'<div class="sc">'
    +'<div class="card" style="margin-bottom:16px">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Contact</div>'
    +'<div style="font-size:13px">'+c.email+'</div>'
    +'<div style="font-size:13px;margin-top:2px">'+c.phone+'</div>'
    +'</div>';

  if(e){
    html+='<div class="card" style="margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-family:var(--ff);font-size:16px;color:var(--gl)">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div></div>'
      +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+sc.score+'%</div>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--gold)">'+e.contract.tier+' &nbsp;&#183;&nbsp; $'+e.contract.weeklyRate+'/week</div>'
      +'</div>';
  }

  html+='<div class="sec">Invoices</div>';
  clientInv.forEach(function(inv){
    var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    html+='<div class="card" style="border-left:3px solid '+col+';margin-bottom:8px;display:flex;justify-content:space-between">'
      +'<div><div style="font-size:11px">'+inv.notes+'</div><div style="font-size:9px;color:var(--dim);margin-top:2px">'+new Date(inv.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div>'
      +'<div style="font-family:var(--ff);font-size:16px;color:var(--gl)">$'+inv.amount.toFixed(2)+'</div>'
      +'</div>';
  });

  html+='</div>'+nav('team');
  render(html);
}

// ── ADD INSPECTOR ─────────────────────────────────────────────────────────
function goAddInspector(){
  var html=topBar('Add Inspector','Invite a New Team Member','goTeam')
    +'<div class="sc">'
    +'<div class="card" style="margin-bottom:16px;background:rgba(201,168,76,0.06)">'
    +'<div style="font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Invite Only</div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.7">Inspectors cannot create their own account. They will receive an invite tied directly to your company so their data stays linked to you.</div>'
    +'</div>'
    +'<div class="sec">Inspector Details</div>'
    +ff('Full Name','text','niName','')
    +ff('Email','email','niEmail','')
    +ff('Phone','tel','niPhone','')
    +ff('Postal Code / Zone','text','niPostal','Base postal code for scheduling')
    +'<div id="niErr" style="display:none;font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:8px">Please fill in name and email.</div>'
    +'<button class="btn-gold" onclick="saveInspector()">Send Invite</button>'
    +'<button class="btn-ghost" onclick="goTeam(\'inspectors\')">Cancel</button>'
    +'</div>';
  render(html);
}

function saveInspector(){
  var name=document.getElementById('niName').value.trim();
  var email=document.getElementById('niEmail').value.trim().toLowerCase();
  if(!name||!email){document.getElementById('niErr').style.display='block';return;}
  var initials=name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  var id='insp_'+Date.now();
  inspectors.push({
    id:id,name:name,email:email,
    phone:document.getElementById('niPhone').value.trim(),
    initials:initials,
    postalCode:document.getElementById('niPostal').value.trim(),
    assignedEstates:[],
    managerEmail:currentUser.email // tenant scoping -- links inspector to this manager
  });
  showToast('Invite sent to '+email);
  goTeam('inspectors');
}

function goInspectorDetail(inspId){
  var insp=inspectors.find(function(i){return i.id===inspId;});
  if(!insp) return;
  var assigned=estates.filter(function(e){return e.contract&&e.contract.assignedInspector===inspId;});
  var completedTotal=assigned.reduce(function(s,e){return s+e.pastInspections.length;},0);

  var html=topBar(insp.name,'Inspector Profile','goTeam')

    +'<div style="font-family:var(--ff);font-size:30px;color:var(--gl);margin-top:8px">'+sc.score+'%</div>'

    +'</div>'
    +'<div class="sec">Assigned Inspector</div>'

      var dStr=insp.completedAt?new Date(insp.completedAt).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'}):'Past';

        +'<div style="flex:1">'
        +'<div style="font-size:12px;font-weight:500">'+dStr+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'
        +(sc2.green?'<span style="color:var(--green)">'+sc2.green+' &#10003;</span>&nbsp; ':'')
        +(sc2.yellow?'<span style="color:var(--yellow)">'+sc2.yellow+' &#9679;</span>&nbsp; ':'')
        +(sc2.red?'<span style="color:var(--red)">'+sc2.red+' &#9888;</span>':'')
        +'</div></div>'
        +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+sc2.score+'%</div>'
        +'</div>';
    });
  } else {
    html+='<div class="sec">Inspection History</div>'
      +'<div style="font-size:11px;color:var(--dim);text-align:center;padding:16px;background:var(--ch2);border:1px solid var(--border);border-radius:2px;margin-bottom:12px">No inspections completed yet</div>';
  }

    +'<div class="sec">Invoices</div>';
  estInv.forEach(function(inv){
    var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    html+='<div class="card" style="border-left:3px solid '+col+';margin-bottom:8px;display:flex;justify-content:space-between">'
      +'<div style="font-size:11px">'+inv.notes+'</div>'

      +'</div>';

  html+='</div>'+nav('dash');
  render(html);

function inspectorSelectId(e){return 'estInsp_'+e.id;}

// ── INVOICES ──────────────────────────────────────────────────────────────
function goInvoices(filterStatus){

    +invFilterBtn('all',filterStatus)+invFilterBtn('unpaid',filterStatus)+invFilterBtn('upcoming',filterStatus)+invFilterBtn('paid',filterStatus)
    +'</div>';

  list.sort(function(a,b){return new Date(b.dueDate)-new Date(a.dueDate);}).forEach(function(inv){
    var e=estates.find(function(x){return x.id===inv.estateId;});
    var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    html+='<div class="card" style="border-left:3px solid '+col+';margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:9px;color:var(--dim)">'+inv.invoiceNum+'</div>'
      +'<div style="font-size:12px;margin-top:2px">'+(e?e.name:'')+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+inv.notes+'</div></div>'
      +'<div style="text-align:right"><div style="font-family:var(--ff);font-size:18px;color:var(--gl)">$'+inv.amount.toFixed(2)+'</div>'
      +'<div style="font-size:9px;color:'+col+';text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+inv.status+'</div></div>'
      +'</div></div>';
  });
  if(!list.length) html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:30px">No invoices found</div>';
  html+='</div>'+nav('billing');

function invFilterBtn(status,active){
  var label=status==='all'?'All':status.charAt(0).toUpperCase()+status.slice(1);
  var sel=status===active;
  return '<button onclick="goInvoices(\''+status+'\')" style="background:'+(sel?'var(--gd)':'transparent')+';border:1px solid '+(sel?'var(--gold)':'var(--border)')+';border-radius:12px;color:'+(sel?'var(--gl)':'var(--dim)')+';font-family:Montserrat,sans-serif;font-size:10px;padding:7px 14px;cursor:pointer">'+label+'</button>';
}

// ── SCHEDULE ──────────────────────────────────────────────────────────────
var mgCalViewDate=new Date();

function goSchedule(){renderMgrCal(mgCalViewDate);}
function shiftMgrCal(d){mgCalViewDate=new Date(mgCalViewDate.getFullYear(),mgCalViewDate.getMonth()+d,1);renderMgrCal(mgCalViewDate);}

function renderMgrCal(vd){
  var y=vd.getFullYear(),m=vd.getMonth();
  var mn=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var today=new Date();

  var dayMap={};
  scheduleItems.forEach(function(s){
    var d=new Date(s.date);
    if(d.getFullYear()===y&&d.getMonth()===m){
      var key=d.getDate();
      if(!dayMap[key]) dayMap[key]=[];
      dayMap[key].push(s);
    }
  });

  var html=topBar('Schedule',mn,'goDash')
    +'<div class="sc">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button onclick="shiftMgrCal(-1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8249;</button>'
    +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+mn+'</div>'
    +'<button onclick="shiftMgrCal(1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8250;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){
    html+='<div style="text-align:center;font-size:9px;color:var(--dim);letter-spacing:1px;padding:4px 0">'+d+'</div>';
  });
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px">';

  for(var i=0;i<fd;i++) html+='<div></div>';
  for(var day=1;day<=dim;day++){
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
    var items=dayMap[day]||[];
    var hasDone=items.some(function(s){return s.status==='completed';});
    var hasSched=items.some(function(s){return s.status==='scheduled';});
    html+='<div style="min-height:42px;background:var(--ch2);border:1px solid '+(isToday?'var(--gold)':'var(--border)')+';border-radius:2px;padding:4px 2px;text-align:center;cursor:'+(items.length?'pointer':'default')+'" '+(items.length?'onclick="mgrDayDetail('+y+','+m+','+day+')"':'')+'>'
      +'<div style="font-size:10px;color:'+(isToday?'var(--gold)':'var(--dim)')+'">'+day+'</div>'
      +(items.length?'<div style="display:flex;justify-content:center;gap:2px;margin-top:3px">'
        +(hasSched?'<div style="width:6px;height:6px;border-radius:50%;background:var(--gold)"></div>':'')
        +(hasDone?'<div style="width:6px;height:6px;border-radius:50%;background:var(--green)"></div>':'')
        +'</div>':'')
      +'</div>';
  }
  html+='</div>';

  var upcoming=scheduleItems.filter(function(s){return new Date(s.date)>=today;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  html+='<div class="sec">Upcoming</div>';
  if(!upcoming.length){
    html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:20px;background:var(--ch2);border:1px solid var(--border);border-radius:2px">No upcoming inspections scheduled</div>';
  } else {
    upcoming.forEach(function(s){
      var e=estates.find(function(x){return x.id===s.estateId;});
      var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
      if(!e) return;
      var dStr=new Date(s.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      html+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div class="cat-ico">'+e.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+'</div></div>'
        +'<div style="text-align:right"><div style="font-size:11px;color:var(--gold)">'+dStr+'</div>'
        +'<div style="font-size:9px;color:var(--dim);margin-top:2px">'+e.postalCode+'</div></div>'
        +'</div>';
    });
  }
  html+='</div>'+nav('cal');
  render(html);
}

function mgrDayDetail(y,m,day){
  var dayItems=scheduleItems.filter(function(s){
    var sd=new Date(s.date);
    return sd.getFullYear()===y&&sd.getMonth()===m&&sd.getDate()===day;
  });
  var dStr=new Date(y,m,day).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var html=topBar(dStr,'Inspections','goSchedule')
    +'<div class="sc">';
  dayItems.forEach(function(s){
    var e=estates.find(function(x){return x.id===s.estateId;});
    var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
    if(!e) return;
    var isDone=s.status==='completed';
    html+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+(isDone?'var(--green)':'var(--gold)')+'">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+'</div></div>'
      +'<div style="font-size:9px;color:'+(isDone?'var(--green)':'var(--gold)')+';text-transform:uppercase;letter-spacing:1px">'+(isDone?'Done':'Scheduled')+'</div>'
      +'</div>';
  });
  html+='</div>'+nav('cal');
  render(html);
}
