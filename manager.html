*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
:root{--black:#0a0a0a;--ch:#141414;--ch2:#1c1c1c;--ch3:#242424;--gold:#c9a84c;--gl:#e2c97e;--gd:rgba(201,168,76,0.15);--green:#4caf7d;--yellow:#e6b84a;--red:#e05c5c;--text:#f0ece4;--dim:#9a9488;--border:rgba(201,168,76,0.2);--ff:"Cormorant Garamond",serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Montserrat',sans-serif;font-weight:300;color:var(--text);background:var(--black);}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
#screen::-webkit-scrollbar{width:3px;}
#screen::-webkit-scrollbar-thumb{background:var(--gd);}
.topbar{background:var(--ch);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:var(--ff);font-size:22px;letter-spacing:2px;color:var(--gl);}
.topbar-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gd);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);cursor:pointer;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:22px;line-height:1;padding:0;margin-right:12px;}
.sc{flex:1;padding:20px;}
.bnav{background:var(--ch);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;color:var(--dim);font-size:8px;letter-spacing:1px;text-transform:uppercase;gap:4px;border:none;background:none;}
.ni.active{color:var(--gold);}
.ni span{font-size:16px;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:1px;color:#000;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:8px;}
.btn-outline{width:100%;background:transparent;border:1px solid var(--gold);border-radius:1px;color:var(--gl);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:8px;}
.btn-ghost{width:100%;background:transparent;border:1px solid var(--border);border-radius:1px;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:11px;cursor:pointer;margin-top:8px;}
.sec{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;margin-top:4px;}
.card{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:10px;}
.card.tap{cursor:pointer;transition:border-color .2s;}
.card.tap:hover{border-color:var(--gold);}
.cat-ico{width:38px;height:38px;border-radius:50%;background:var(--gd);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pbar-wrap{background:var(--ch3);border-radius:10px;height:5px;margin-top:6px;overflow:hidden;}
.pbar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--gl));}
.lbl{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.inp{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:300;padding:12px 16px;margin-bottom:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--gold);}
.sel{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;padding:12px;margin-bottom:14px;outline:none;}
.pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ch);border:1px solid var(--gold);border-radius:2px;padding:10px 20px;font-size:11px;color:var(--gl);z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.toggle{width:44px;height:24px;border-radius:12px;border:1px solid var(--border);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;transition:transform .2s;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.color-swatch.selected{border-color:#fff;}
</style>
</head>

// ── CORE HELPERS ─────────────────────────────────────────────────────────────
function render(html){
  document.getElementById('screen').innerHTML=html;
  document.querySelectorAll('[data-back]').forEach(function(el){
    el.addEventListener('click',function(){var fn=this.getAttribute('data-back');if(fn&&window[fn])window[fn]();});
  });
  document.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-action');
      if(a==='estate'){var origin=this.getAttribute('data-origin');if(origin){var p=origin.split('|');_estateDetailOrigin=p[0]+(p[1]?'|'+p[1]:'');}else{_estateDetailOrigin='goEstates';}goEstateDetail(this.getAttribute('data-id'));}
      else if(a==='client') goClientDetail(this.getAttribute('data-id'));
      else if(a==='inspector') goInspectorDetail(this.getAttribute('data-id'));
      else if(a==='nav'){var fn=this.getAttribute('data-fn');if(fn&&window[fn])window[fn]();}
      else if(a==='esthistory'){goEstateInvoiceHistory(this.getAttribute('data-id'));}
      else if(a==='mgrinv'){var bk=this.getAttribute('data-back')||'goFinancials';mgrInvoiceDetail(this.getAttribute('data-id'),bk);}
    });
  });
  // Inspector switch cards
  document.querySelectorAll('[data-switchid]').forEach(function(el){
    el.addEventListener('click',function(){doSwitchToInspectorById(this.getAttribute('data-switchid'));});
  });
  // Inspection detail cards
  document.querySelectorAll('[data-estid][data-inspidx]').forEach(function(el){
    el.addEventListener('click',function(){mgrInspectionDetail(this.getAttribute('data-estid'),parseInt(this.getAttribute('data-inspidx')));});
  });
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function ff(label,type,id,ph,val){return '<div class="lbl">'+label+'</div><input class="inp" type="'+type+'" id="'+id+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'">';}
function fs(label,id,opts){return '<div class="lbl">'+label+'</div><select class="sel" id="'+id+'">'+opts+'</select>';}

function liveScore(e){var all=[];Object.values(e.data).forEach(function(c){all=all.concat(c.points);});return scoreOf(all);}
function scoreOf(pts){var g=0,y=0,r=0,t=pts.length;pts.forEach(function(p){if(p.status==='green')g++;else if(p.status==='yellow')y++;else if(p.status==='red')r++;});return{score:t>0?Math.round(((g*2+y)/(t*2))*100):0,green:g,yellow:y,red:r,total:t};}

function topBar(title,sub,back){
  if(back&&back.indexOf('|')>=0){var parts=back.split('|');var bfn=parts[0];var barg=parts[1];var l='<div style="display:flex;align-items:center"><button class="back-btn" onclick="'+bfn+'(\''+barg+'\')">←</button><div><div class="topbar-title">'+title+'</div><div class="topbar-sub">'+sub+'</div></div></div>';return '<div class="topbar">'+l+'<div class="avatar" data-action="nav" data-fn="goSettings" title="Account">'+currentUser.initials+'</div></div>';}
  var l=back?'<div style="display:flex;align-items:center"><button class="back-btn" data-back="'+back+'">&#8592;</button><div><div class="topbar-title">'+title+'</div><div class="topbar-sub">'+sub+'</div></div></div>':'<div><div class="topbar-title">'+title+'</div><div class="topbar-sub">'+sub+'</div></div>';
  return '<div class="topbar">'+l+'<div class="avatar" data-action="nav" data-fn="goSettings" title="Account">'+currentUser.initials+'</div></div>';
}

function doSwitchToInspectorById(id){

function doSwitchToInspector(insp){
  if(!insp) return;
  var inspUser={email:insp.email,role:'inspector',name:insp.name,initials:insp.initials,phone:insp.phone,managerMode:true,managerEmail:currentUser.email};

function goTierInvoices(tier){
  // Matches tierTotals calc in goFinancials: all paid invoices for estates of this contract tier
  var list=allInvoices.filter(function(i){
    if(i.status!=='paid') return false;
    var e=estates.find(function(x){return x.id===i.estateId;});
    var t=e&&e.contract?e.contract.tier:'Other';
    return t===tier;
  }).sort(function(a,b){return new Date(b.paidDate)-new Date(a.paidDate);});
  return renderStatusInvoiceList(list,tier,'Paid Invoices — All Time');
}

function goMonthInvoicesFiltered(year,month,status){
  if(status==='paid'){
    // Match the "Paid this month" total: filter by paidDate, not dueDate
    var list=allInvoices.filter(function(i){return i.status==='paid'&&i.paidDate&&new Date(i.paidDate).getFullYear()===year&&new Date(i.paidDate).getMonth()===month;})
      .sort(function(a,b){return new Date(a.paidDate)-new Date(b.paidDate);});
    return renderStatusInvoiceList(list,'Paid Invoices',new Date(year,month).toLocaleDateString('en-US',{month:'long',year:'numeric'}));
  }
  if(status==='unpaid'){
    // Match the "Unpaid" total on Financials: NOT month-scoped, shows all outstanding invoices
    var list=allInvoices.filter(function(i){return i.status==='unpaid';})
      .sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate);});
    return renderStatusInvoiceList(list,'Unpaid Invoices','All Outstanding');
  }
  goMonthInvoices(year,month,status);
}

function goMonthInvoices(year,month,filterStatus){
  var monthDate=new Date(year,month);
  var monthLabel=monthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var monthInvoices=allInvoices.filter(function(i){
    var d=new Date(i.dueDate);
    var matchMonth=d.getFullYear()===year&&d.getMonth()===month;
    return matchMonth&&(!filterStatus||i.status===filterStatus);
  }).sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate);});

  var subLabel=filterStatus?(filterStatus.charAt(0).toUpperCase()+filterStatus.slice(1)+' Invoices'):'Invoices Due This Month';
  var html=topBar(monthLabel,subLabel,'goFinancials')
    +'<div class="sc">';
  monthInvoices.forEach(function(inv){
    var e=estates.find(function(x){return x.id===inv.estateId;});
    var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    html+='<div class="card tap" data-action="mgrinv" data-id="'+inv.id+'" data-back="goFinancials" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+col+';cursor:pointer">'
      +'<div style="flex:1">'
      +'<div style="font-size:12px">'+(e?e.name:'')+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+inv.notes+'</div>'
      +(inv.status==='paid'&&inv.paidDate?'<div style="font-size:9px;color:var(--green);margin-top:2px">&#10003; Paid '+new Date(inv.paidDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})+(inv.paymentMethod?' via '+inv.paymentMethod:'')+'</div>':'')
      +'</div>'
      +'<div style="text-align:right"><div style="font-family:var(--ff);font-size:18px;color:'+col+'">$'+inv.amount.toFixed(2)+'</div>'
      +'<div style="font-size:9px;color:'+col+';text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+inv.status+'</div></div>'
      +'</div>';
  });
  if(!monthInvoices.length) html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:30px">No '+(filterStatus||'')+' invoices this month</div>';
  html+='</div>'+nav('billing');
  render(html);
}

// ── REPORTS (all invoices, custom date range) ──────────────────────────────
var _reportsRange={start:null,end:null,preset:'ytd'};

function goReports(preset){
  preset=preset||_reportsRange.preset||'ytd';
  _reportsRange.preset=preset;
  var now=new Date();
  var start,end;

  if(preset==='ytd'){start=new Date(now.getFullYear(),0,1);end=now;}
  else if(preset==='last12'){start=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());end=now;}
  else if(preset==='thisyear'){start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear(),11,31);}
  else if(preset==='lastyear'){start=new Date(now.getFullYear()-1,0,1);end=new Date(now.getFullYear()-1,11,31);}
  else if(preset==='custom'&&_reportsRange.start&&_reportsRange.end){start=new Date(_reportsRange.start);end=new Date(_reportsRange.end);}
  else{start=new Date(now.getFullYear(),0,1);end=now;}

  _reportsRange.start=start.toISOString().slice(0,10);
  _reportsRange.end=end.toISOString().slice(0,10);

  var inRange=allInvoices.filter(function(i){
    var d=new Date(i.dueDate);
    return d>=start&&d<=end;
  });

  var totalPaid=inRange.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0);
  var totalUnpaid=inRange.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);
  var totalUpcoming=inRange.filter(function(i){return i.status==='upcoming';}).reduce(function(s,i){return s+i.amount;},0);
  var totalAll=totalPaid+totalUnpaid+totalUpcoming;

  var rangeLabel=start.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' — '+end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  var html=topBar('Reports',rangeLabel,'goFinancials')
    +'<div class="sc">'
    +'<div class="sec">Date Range</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
    +reportPresetBtn('ytd','Year to Date',preset)
    +reportPresetBtn('last12','Last 12 Months',preset)
    +reportPresetBtn('thisyear','This Calendar Year',preset)
    +reportPresetBtn('lastyear','Last Calendar Year',preset)
    +'</div>'
    +'<div class="card tap" onclick="showCustomRangePicker()" style="text-align:center;padding:10px;margin-bottom:20px;'+(preset==='custom'?'border-color:var(--gold)':'')+'">'
    +'<span style="font-size:10px;color:var(--gold)">'+(preset==='custom'?'Custom: '+rangeLabel:'&#128197; Choose Custom Range')+'</span>'
    +'</div>'

function goReportInvoiceList(filterStatus){
  var start=new Date(_reportsRange.start);
  var end=new Date(_reportsRange.end);
  var list=allInvoices.filter(function(i){
    var d=new Date(i.dueDate);
    var inRange=d>=start&&d<=end;
    return inRange&&(filterStatus==='all'||i.status===filterStatus);
  }).sort(function(a,b){return new Date(b.dueDate)-new Date(a.dueDate);});

  var titleMap={paid:'Income',unpaid:'Outstanding',upcoming:'Upcoming',all:'All Invoices'};
  var html=topBar(titleMap[filterStatus]||'Invoices',start.toLocaleDateString('en-US',{month:'short',year:'numeric'})+' — '+end.toLocaleDateString('en-US',{month:'short',year:'numeric'}),'goReports')
    +'<div class="sc">';
  list.forEach(function(inv){
    var e=estates.find(function(x){return x.id===inv.estateId;});
    var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    html+='<div class="card tap" data-action="mgrinv" data-id="'+inv.id+'" data-back="goReports" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+col+';cursor:pointer">'
      +'<div style="flex:1">'
      +'<div style="font-size:12px">'+(e?e.name:'')+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+inv.notes+'</div>'
      +'</div>'
      +'<div style="text-align:right"><div style="font-family:var(--ff);font-size:18px;color:'+col+'">$'+inv.amount.toFixed(2)+'</div>'
      +'<div style="font-size:9px;color:'+col+';text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+inv.status+'</div></div>'
      +'</div>';
  });
  if(!list.length) html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:30px">No invoices found in this range</div>';
  html+='</div>'+nav('billing');
  render(html);
}

function goFinancials(){
  var now=new Date();
  var thisMonth=now.getMonth(),thisYear=now.getFullYear();
  var lastMonth=thisMonth===0?11:thisMonth-1;
  var lastMonthYear=thisMonth===0?thisYear-1:thisYear;

  // MTD Revenue = actually collected (paid) this month. Billed = all invoices due this month (paid + unpaid + upcoming), shown as context only.
  var mtdBilled=allInvoices.filter(function(i){return new Date(i.dueDate).getMonth()===thisMonth&&new Date(i.dueDate).getFullYear()===thisYear;}).reduce(function(s,i){return s+i.amount;},0);
  var mtdPaid=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getMonth()===thisMonth&&new Date(i.paidDate).getFullYear()===thisYear;}).reduce(function(s,i){return s+i.amount;},0);
  var mtd=mtdPaid; // headline MTD figure = collected revenue, not billed
  var lastMonthPaid=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getMonth()===lastMonth&&new Date(i.paidDate).getFullYear()===lastMonthYear;}).reduce(function(s,i){return s+i.amount;},0);
  var lastMonthTotal=lastMonthPaid; // compare collected vs collected, not billed vs billed
  var trend=lastMonthTotal>0?Math.round(((mtd-lastMonthTotal)/lastMonthTotal)*100):0;
  var ytd=allInvoices.filter(function(i){return i.status==='paid'&&new Date(i.paidDate).getFullYear()===thisYear;}).reduce(function(s,i){return s+i.amount;},0);
  var avgPerClient=clients.length>0?(ytd/clients.length):0;

  var paidThisMonth=mtdPaid;
  var unpaidTotal=allInvoices.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);
  var upcoming30=allInvoices.filter(function(i){return i.status==='upcoming';}).reduce(function(s,i){return s+i.amount;},0);

  // Revenue by tier
  var tierTotals={};
  allInvoices.filter(function(i){return i.status==='paid';}).forEach(function(i){
    var e=estates.find(function(x){return x.id===i.estateId;});
    var tier=e&&e.contract?e.contract.tier:'Other';
    tierTotals[tier]=(tierTotals[tier]||0)+i.amount;
  });
  var maxTier=Math.max.apply(null,Object.values(tierTotals).concat([1]));

  var html=topBar('Financials','Revenue Overview','goDash')
    +'<div class="sc">'
    +'<div class="card tap" onclick="goMonthInvoices('+thisYear+','+thisMonth+')" style="border-color:var(--gold);margin-bottom:14px;cursor:pointer">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Month to Date Revenue</div>'
    +'<div style="font-size:14px;color:var(--gold)">&#8250;</div>'
    +'</div>'
    +'<div style="font-family:var(--ff);font-size:32px;color:var(--gl)">$'+mtd.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div>'
    +'<div style="font-size:10px;color:var(--dim);margin-top:4px">$'+mtdBilled.toFixed(2)+' billed &nbsp;&#183;&nbsp; $'+(mtdBilled-mtdPaid).toFixed(2)+' outstanding</div>'
    +(lastMonthTotal>0?'<div style="font-size:10px;color:'+(trend>=0?'var(--green)':'var(--red)')+';margin-top:6px">'+(trend>=0?'&#9650;':'&#9660;')+' '+Math.abs(trend)+'% vs last month</div>':'')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    +'<div class="card" style="padding:12px"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Year to Date</div><div style="font-size:18px;color:var(--text);margin-top:4px">$'+ytd.toLocaleString('en',{maximumFractionDigits:0})+'</div></div>'
    +'<div class="card" style="padding:12px"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Avg / Client</div><div style="font-size:18px;color:var(--text);margin-top:4px">$'+avgPerClient.toFixed(0)+'</div></div>'
    +'</div>'
    +'<div class="sec">Invoice Status</div>'
    +'<div class="card tap" onclick="goMonthInvoicesFiltered('+thisYear+','+thisMonth+',\'paid\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><div style="font-size:12px">Paid this month</div></div>'
    +'<div style="font-size:13px;color:var(--green);font-weight:500">$'+paidThisMonth.toFixed(2)+'</div></div>'
    +'<div class="card tap" onclick="goMonthInvoicesFiltered('+thisYear+','+thisMonth+',\'unpaid\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;border-color:'+(unpaidTotal>0?'var(--red)':'var(--border)')+'">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div><div style="font-size:12px">Unpaid</div></div>'
    +'<div style="font-size:13px;color:var(--red);font-weight:500">$'+unpaidTotal.toFixed(2)+'</div></div>'
    +'<div class="card tap" onclick="goInvoices(\'upcoming\')" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></div><div style="font-size:12px">Upcoming (30 days)</div></div>'
    +'<div style="font-size:13px;color:var(--gold);font-weight:500">$'+upcoming30.toFixed(2)+'</div></div>'
    +'<div class="sec">Revenue by Service Tier</div>'
    +'<div class="card" style="margin-bottom:16px">';

  Object.keys(tierTotals).forEach(function(tier){
    var pct=Math.round((tierTotals[tier]/maxTier)*100);
    html+='<div class="tap" onclick="goTierInvoices(\''+tier.replace(/'/g,"\\'")+'\')" style="margin-bottom:12px;cursor:pointer">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:11px;color:var(--text)">'+tier+'</div><div style="font-size:11px;color:var(--text)">$'+tierTotals[tier].toFixed(0)+'</div></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+pct+'%"></div></div>'
      +'</div>';
  });

  html+='</div>'
    +'<div class="card tap" onclick="goReports()" style="display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-size:11px;color:var(--gl)">All Invoices &amp; Reports</div><div style="font-size:14px;color:var(--gold)">&#8250;</div>'
    +'</div>'
    +'</div>'+nav('billing');
  render(html);
}

function saveInspector(){
  var name=document.getElementById('niName').value.trim();
  var email=document.getElementById('niEmail').value.trim().toLowerCase();
  if(!name||!email){document.getElementById('niErr').style.display='block';return;}
  var initials=name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  var id='insp_'+Date.now();
  inspectors.push({
    id:id,name:name,email:email,
    phone:document.getElementById('niPhone').value.trim(),
    initials:initials,
    postalCode:document.getElementById('niPostal').value.trim(),
    assignedEstates:[],
    managerEmail:currentUser.email // tenant scoping -- links inspector to this manager
  });
  showToast('Invite sent to '+email);
  goTeam('inspectors');
}

  });

function renderInvoiceGroups(tab,searchTerm){
  var today=new Date();
  searchTerm=(searchTerm||'').toLowerCase();

  var matchingEstates=estates.filter(function(e){
    if(!searchTerm) return true;
    return e.name.toLowerCase().indexOf(searchTerm)>=0
      ||e.clientName.toLowerCase().indexOf(searchTerm)>=0
      ||e.address.toLowerCase().indexOf(searchTerm)>=0;
  });

  // Sort so estates needing attention appear first
  matchingEstates=matchingEstates.slice().sort(function(a,b){
    var aInv=allInvoices.filter(function(i){return i.estateId===a.id;});
    var bInv=allInvoices.filter(function(i){return i.estateId===b.id;});
    var aOverdue=aInv.filter(function(i){return i.status==='unpaid';}).length;
    var bOverdue=bInv.filter(function(i){return i.status==='unpaid';}).length;
    if(tab==='attention'){
      if(aOverdue!==bOverdue) return bOverdue-aOverdue; // most overdue first
    } else if(tab==='upcoming'){
      var aUp=aInv.filter(function(i){return i.status==='upcoming';});
      var bUp=bInv.filter(function(i){return i.status==='upcoming';});
      var aNext=aUp.length?new Date(aUp[0].dueDate):new Date(8640000000000000);
      var bNext=bUp.length?new Date(bUp[0].dueDate):new Date(8640000000000000);
      return aNext-bNext; // soonest due first
    }
    return a.name.localeCompare(b.name);
  });

  var html='';
  matchingEstates.forEach(function(e){
    var estInv=allInvoices.filter(function(i){return i.estateId===e.id;});
    var overdue=estInv.filter(function(i){return i.status==='unpaid';});
    var upcoming=estInv.filter(function(i){return i.status==='upcoming';});

    // Decide what to show for this estate based on tab
    var rowsToShow=[];
    if(tab==='attention') rowsToShow=overdue;
    else if(tab==='upcoming') rowsToShow=upcoming;
    else rowsToShow=estInv.slice().sort(function(a,b){return new Date(b.dueDate)-new Date(a.dueDate);});

    // Skip estate entirely if nothing relevant to show in this tab
    if(tab==='attention'&&!overdue.length) return;
    if(tab==='upcoming'&&!upcoming.length) return;

    html+='<div class="sec">'+e.name+'</div>';

    {
      rowsToShow.forEach(function(inv){
        var col=inv.status==='paid'?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
        var daysLate=inv.status==='unpaid'?Math.floor((today-new Date(inv.dueDate))/86400000):0;
        html+='<div class="card tap" data-action="mgrinv" data-id="'+inv.id+'" data-back="goInvoices" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+col+';cursor:pointer">'
          +'<div style="flex:1">'
          +'<div style="font-size:12px">'+inv.notes+'</div>'
          +'<div style="font-size:10px;color:var(--dim);margin-top:2px">Due '+new Date(inv.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})+(daysLate>0?' &middot; '+daysLate+' days late':'')+'</div>'
          +'</div>'
          +'<div style="font-family:var(--ff);font-size:18px;color:'+col+'">$'+inv.amount.toFixed(2)+'</div>'
          +'</div>';
      });
    }

    html+='<div class="card tap" data-action="esthistory" data-id="'+e.id+'" style="text-align:center;padding:10px;cursor:pointer;background:transparent;border-style:dashed;margin-bottom:16px">'
      +'<span style="font-size:10px;color:var(--gold)">View full history ('+estInv.length+' invoices) &#8250;</span>'
      +'</div>';
  });

  if(!html){
    if(tab==='attention'){
      html='<div class="card" style="text-align:center;padding:30px;border-color:var(--green)"><div style="color:var(--green);font-size:24px;margin-bottom:8px">&#10003;</div><div style="font-size:12px;color:var(--text)">All clients are caught up</div><div style="font-size:10px;color:var(--dim);margin-top:4px">No overdue invoices right now</div></div>';
    } else {
      html='<div style="font-size:11px;color:var(--dim);text-align:center;padding:30px">No invoices found</div>';
    }
  }
  return html;
}

// ── SCHEDULE ──────────────────────────────────────────────────────────────
var mgCalViewDate=new Date();

function goSchedule(){renderMgrCal(mgCalViewDate);}
function shiftMgrCal(d){mgCalViewDate=new Date(mgCalViewDate.getFullYear(),mgCalViewDate.getMonth()+d,1);renderMgrCal(mgCalViewDate);}

function renderMgrCal(vd){
  var y=vd.getFullYear(),m=vd.getMonth();
  var mn=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var today=new Date();

  var dayMap={};
  scheduleItems.forEach(function(s){
    var d=new Date(s.date);
    if(d.getFullYear()===y&&d.getMonth()===m){
      var key=d.getDate();
      if(!dayMap[key]) dayMap[key]=[];
      dayMap[key].push(s);
    }
  });

  var html=topBar('Schedule',mn,'goDash')
    +'<div class="sc">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button onclick="shiftMgrCal(-1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8249;</button>'
    +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+mn+'</div>'
    +'<button onclick="shiftMgrCal(1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8250;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){
    html+='<div style="text-align:center;font-size:9px;color:var(--dim);letter-spacing:1px;padding:4px 0">'+d+'</div>';
  });
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px">';

  for(var i=0;i<fd;i++) html+='<div></div>';
  for(var day=1;day<=dim;day++){
    var isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===day;
    var items=dayMap[day]||[];
    var hasDone=items.some(function(s){return s.status==='completed';});
    var hasSched=items.some(function(s){return s.status==='scheduled';});
    html+='<div style="min-height:42px;background:var(--ch2);border:1px solid '+(isToday?'var(--gold)':'var(--border)')+';border-radius:2px;padding:4px 2px;text-align:center;cursor:'+(items.length?'pointer':'default')+'" '+(items.length?'onclick="mgrDayDetail('+y+','+m+','+day+')"':'')+'>'
      +'<div style="font-size:10px;color:'+(isToday?'var(--gold)':'var(--dim)')+'">'+day+'</div>'
      +(items.length?'<div style="display:flex;justify-content:center;gap:2px;margin-top:3px">'
        +(hasSched?'<div style="width:6px;height:6px;border-radius:50%;background:var(--gold)"></div>':'')
        +(hasDone?'<div style="width:6px;height:6px;border-radius:50%;background:var(--green)"></div>':'')
        +'</div>':'')
      +'</div>';
  }
  html+='</div>';

  var todayStr2=today.toDateString();
  var nextUp=scheduleItems.filter(function(s){
    return new Date(s.date).toDateString()===todayStr2&&s.status!=='completed';
  }).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  html+='<div class="sec">Next Up (Today)</div>';
  if(!nextUp.length){
    html+='<div style="font-size:11px;color:var(--dim);text-align:center;padding:20px;background:var(--ch2);border:1px solid var(--border);border-radius:2px">No remaining inspections today</div>';
  } else {
    nextUp.forEach(function(s){
      var e=estates.find(function(x){return x.id===s.estateId;});
      var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
      if(!e) return;
      var timeStr2=new Date(s.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer">'
        +'<div class="cat-ico">'+e.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+'</div></div>'
        +'<div style="text-align:right"><div style="font-size:11px;color:var(--gold)">'+timeStr2+'</div>'
        +'<div style="font-size:9px;color:var(--dim);margin-top:2px">'+e.postalCode+'</div></div>'
        +'</div>';
    });
  }
  html+='<div class="card tap" onclick="goFullSchedule()" style="text-align:center;padding:10px;cursor:pointer;background:transparent;border-style:dashed;margin-top:4px">'
    +'<span style="font-size:10px;color:var(--gold)">View Full Upcoming Schedule &#8250;</span>'
    +'</div>';
  html+='</div>'+nav('cal');
  render(html);
}

function goFullSchedule(){
  var today=new Date();
  var upcoming=scheduleItems.filter(function(s){return new Date(s.date)>=today&&s.status!=='completed';}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var html=topBar('Full Schedule',upcoming.length+' Upcoming Inspections','goSchedule')
    +'<div class="sc">';
  upcoming.forEach(function(s){
    var e=estates.find(function(x){return x.id===s.estateId;});
    var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
    if(!e) return;
    var dStr=new Date(s.date).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
    html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:11px;color:var(--gold)">'+dStr+'</div>'
      +'<div style="font-size:9px;color:var(--dim);margin-top:2px">'+e.postalCode+'</div></div>'
      +'</div>';
  });
  html+='</div>'+nav('cal');
  render(html);
}

function mgrDayDetail(y,m,day){
  var dayItems=scheduleItems.filter(function(s){
    var sd=new Date(s.date);
    return sd.getFullYear()===y&&sd.getMonth()===m&&sd.getDate()===day;
  });
  var dStr=new Date(y,m,day).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var html=topBar(dStr,'Inspections','goSchedule')
    +'<div class="sc">';
  dayItems.forEach(function(s){
    var e=estates.find(function(x){return x.id===s.estateId;});
    var insp=inspectors.find(function(i){return i.id===s.inspectorId;});
    if(!e) return;
    var isDone=s.status==='completed';
    html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;border-left:3px solid '+(isDone?'var(--green)':'var(--gold)')+';cursor:pointer">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+(insp?insp.name:'Unassigned')+'</div></div>'
      +'<div style="font-size:9px;color:'+(isDone?'var(--green)':'var(--gold)')+';text-transform:uppercase;letter-spacing:1px">'+(isDone?'Done':'Scheduled')+'</div>'
      +'</div>';
  });
  html+='</div>'+nav('cal');
  render(html);
}

// ── COMPANY PROFILE (white-label settings) ───────────────────────────────
var BRAND_COLORS=['#c9a84c','#5c8de0','#4caf7d','#c95c5c','#9c5ce0','#e0a05c'];

function goCompanyProfile(){
  var html=topBar('Company Profile','Branding & Invoice Details','goDash')
    +'<div class="sc">'
    +'<div class="sec">Logo</div>'
    +'<div class="card" style="text-align:center;margin-bottom:16px">'
    +'<img src="'+tenantConfig.logoUrl+'" style="width:64px;height:64px;border-radius:8px;margin-bottom:10px">'
    +'<button class="btn-outline" onclick="showToast(\'Logo upload available once Firestore is connected\')">Upload New Logo</button>'
    +'</div>'
    +'<div class="sec">Brand Color</div>'
    +'<div class="card" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">';
  BRAND_COLORS.forEach(function(c){
    html+='<div class="color-swatch'+(tenantConfig.brandColor===c?' selected':'')+'" style="background:'+c+'" onclick="selectBrandColor(\''+c+'\')"></div>';
  });
  html+='</div>'
    +'<div class="sec">Background Theme</div>'
    +'<div class="card" style="display:flex;gap:10px;margin-bottom:16px">'
    +themeBtn('dark','Black')
    +themeBtn('light','White')
    +'</div>'
    +'<div class="sec">Company Details</div>'
    +'<div class="card" style="margin-bottom:16px">'
    +ff('Company Name','text','cpName',tenantConfig.companyName,tenantConfig.companyName)
    +ff('Business Address','text','cpAddress','123 Main St, City, Province',tenantConfig.businessAddress)
    +ff('Tax / GST Number','text','cpTax','',tenantConfig.taxNumber)
    +ff('Business License Number','text','cpLicense','',tenantConfig.licenseNumber)
    +'</div>'
    +'<div class="sec">Invoice Footer</div>'
    +'<div class="card" style="margin-bottom:16px">'
    +'<textarea id="cpFooter" placeholder="Thank you message, terms, or payment instructions shown on every invoice" style="width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:Montserrat,sans-serif;font-size:13px;padding:12px;outline:none;resize:vertical;min-height:80px">'+(tenantConfig.invoiceFooter||'')+'</textarea>'
    +'</div>'
    +'<button class="btn-gold" onclick="saveCompanyProfile()">Save Changes</button>'
    +'</div>'+nav('dash');
  render(html);
}
function themeBtn(val,label){
  var sel=tenantConfig.bgTheme===val;
  return '<div onclick="selectTheme(\''+val+'\')" style="flex:1;text-align:center;padding:14px;border:2px solid '+(sel?'var(--gold)':'var(--border)')+';border-radius:2px;cursor:pointer;background:'+(val==='dark'?'#0a0a0a':'#f0ece4')+'">'
    +'<div style="font-size:11px;color:'+(val==='dark'?'#fff':'#0a0a0a')+'">'+label+'</div>'
    +(sel?'<div style="font-size:9px;color:var(--gold);margin-top:4px">&#10003; Selected</div>':'')
    +'</div>';
}
function selectBrandColor(c){tenantConfig.brandColor=c;goCompanyProfile();}
function selectTheme(t){tenantConfig.bgTheme=t;goCompanyProfile();}
function saveCompanyProfile(){
  tenantConfig.companyName=document.getElementById('cpName').value.trim()||tenantConfig.companyName;
  tenantConfig.businessAddress=document.getElementById('cpAddress').value.trim();
  tenantConfig.taxNumber=document.getElementById('cpTax').value.trim();
  tenantConfig.licenseNumber=document.getElementById('cpLicense').value.trim();
  tenantConfig.invoiceFooter=document.getElementById('cpFooter').value.trim();
  showToast('Company profile saved');
  goDash();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function goSettings(){
  var html=topBar('Settings','Account','goDash')
    +'<div class="sc">'
    +'<div class="card" style="margin-bottom:16px">'
    +'<div style="font-size:10px;color:var(--dim);margin-bottom:4px">Signed in as</div>'
    +'<div style="font-family:var(--ff);font-size:18px;color:var(--gl)">'+currentUser.name+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:4px">'+currentUser.email+'</div>'
    +'</div>'
    +'<div class="card tap" onclick="goCompanyProfile()" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<div style="font-size:12px;color:var(--gold)">Company Profile</div><div style="font-size:14px;color:var(--gold)">&#8250;</div>'
    +'</div>'
    +'<button class="btn-ghost" onclick="doSignOut()">Sign Out</button>'
    +'</div>'+nav('settings');
  render(html);
}

function doSignOut(){
  localStorage.removeItem('ec_user');
  window.location.href=base+'index.html';
}

goDash();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
}
</script>
