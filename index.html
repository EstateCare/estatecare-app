<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
:root{--black:#0a0a0a;--ch:#141414;--ch2:#1c1c1c;--ch3:#242424;--gold:#c9a84c;--gl:#e2c97e;--gd:rgba(201,168,76,0.15);--green:#4caf7d;--yellow:#e6b84a;--red:#e05c5c;--text:#f0ece4;--dim:#9a9488;--border:rgba(201,168,76,0.2);--ff:"Cormorant Garamond",serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Montserrat',sans-serif;font-weight:300;color:var(--text);background:var(--black);}
#screen{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
#screen::-webkit-scrollbar{width:3px;}
#screen::-webkit-scrollbar-thumb{background:var(--gd);}
.gold-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:1px;color:#000;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:16px;cursor:pointer;transition:opacity .2s;}
.btn-gold:hover{opacity:.88;}
.btn-outline-gold{width:100%;background:transparent;border:1px solid var(--gold);border-radius:1px;color:var(--gl);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;padding:14px;cursor:pointer;}
.btn-ghost{width:100%;background:transparent;border:none;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:4px;}
.inp{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:300;padding:12px 16px;margin-bottom:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--gold);}
.sel{width:100%;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;padding:12px;margin-bottom:14px;outline:none;}
.lbl{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:20px;margin-bottom:12px;}
.sec{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;margin-top:4px;}
.topbar{background:var(--ch);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:var(--ff);font-size:22px;letter-spacing:2px;color:var(--gl);}
.topbar-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.back-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:22px;line-height:1;padding:0;margin-right:12px;}
.sc{flex:1;padding:20px;}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--ch3);transition:background .3s;}
.step-dot.active{background:var(--gold);}
.step-dot.done{background:var(--green);}
.tier-card{background:var(--ch2);border:2px solid var(--border);border-radius:2px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;}
.tier-card:hover{border-color:var(--gold);}
.tier-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.08);}
.tier-popular{position:absolute;top:-1px;right:16px;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:0 0 4px 4px;}
.tier-price{font-family:var(--ff);font-size:32px;color:var(--gl);margin:8px 0 4px;}
.tier-freq{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:12px;}
.tier-feature{font-size:11px;color:var(--text);padding:4px 0;border-bottom:1px solid rgba(201,168,76,0.08);display:flex;align-items:flex-start;gap:8px;}
.tier-feature:last-child{border-bottom:none;}
.tier-check{color:var(--green);flex-shrink:0;font-size:11px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{min-height:44px;background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:4px;text-align:left;}
.cal-day.available{cursor:pointer;transition:border-color .2s;}
.cal-day.available:hover{border-color:var(--gold);}
.cal-day.selected{border-color:var(--gold);background:rgba(201,168,76,0.12);}
.cal-day.past{opacity:.35;}
.cal-day.today{border-color:rgba(201,168,76,0.4);}
.time-slot{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
.time-slot:hover{border-color:var(--gold);}
.time-slot.selected{border-color:var(--gold);background:rgba(201,168,76,0.1);}
.time-slot.full{opacity:.4;cursor:default;pointer-events:none;}
.disclaimer{font-size:9px;color:var(--dim);line-height:1.7;letter-spacing:.5px;padding:16px;background:var(--ch2);border:1px solid var(--border);border-radius:2px;margin-top:4px;}
.err{font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:10px;display:none;}
.err.show{display:block;}
.feat-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.feat-label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;}

.bnav{padding-bottom:max(10px,env(safe-area-inset-bottom));}


.pwa-banner{position:fixed;bottom:70px;left:12px;right:12px;background:var(--ch);border:1px solid var(--gold);border-radius:4px;padding:12px 16px;z-index:300;display:none;animation:slideUp .3s ease;box-shadow:0 4px 24px rgba(0,0,0,.6);}
.pwa-banner.show{display:block;}
.pwa-banner-row{display:flex;align-items:center;gap:10px;}
.pwa-banner-icon{font-size:22px;flex-shrink:0;color:var(--gold);}
.pwa-banner-text{flex:1;}
.pwa-banner-title{font-size:12px;font-weight:500;color:var(--gl);margin-bottom:2px;}
.pwa-banner-sub{font-size:10px;color:var(--dim);}
.pwa-btn{background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:2px;color:#000;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:8px 12px;cursor:pointer;white-space:nowrap;}
.pwa-dismiss{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;}
.pwa-steps{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:12px;margin-top:10px;display:none;}
.pwa-steps.show{display:block;}
.pwa-step{font-size:11px;color:var(--text);padding:5px 0;border-bottom:1px solid rgba(201,168,76,0.08);display:flex;align-items:center;gap:10px;}
.pwa-step:last-child{border-bottom:none;}
.pwa-step-num{width:20px;height:20px;border-radius:50%;background:var(--gd);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);flex-shrink:0;}

.welcome-bg{
  background-image:linear-gradient(180deg,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.35) 60%,rgba(0,0,0,0.85) 100%),url(mansion-bg.jpg);
  background-color:#0a0a0a;
  background-size:cover;
  background-position:center;
}
/* On wider screens (laptop/desktop) the low-res source image stretches and blurs with "cover".
   Switch to "contain" so it stays sharp at native resolution, with the dark background filling the rest. */
@media (min-width:700px){
  .welcome-bg{
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center top;
  }
}
</style>
</head>
<body>
<div id="app"><div id="screen"></div></div>
<script>
var base=window.location.pathname.replace('index.html','').replace(/\/$/,'/')||'/';
if(base==='/')base='/';

// Signup state
var signup={
  step:1,
  tier:null,
  billing:'monthly',
  name:'',email:'',password:'',phone:'',
  secName:'',secPhone:'',secAddr:'',
  propName:'',propAddr:'',propPostal:'',propType:'Single Family',features:[],security:[],
  walkDate:null,walkTime:null
};

// Walk-through bookings (in real app this comes from server)
var existingBookings=[]; // {date:'Mon Jun 09 2026', time:'9:00 AM'}

var TIERS=[
  {id:'essential',name:'Essential',price:69.95,freq:'1 inspection per week',popular:false,
   features:['Weekly property inspection','Interior & exterior walkthrough','Water leak check','HVAC check','Security check','Timestamped photo report','Email notification of issues']},
  {id:'preferred',name:'Preferred',price:79.95,freq:'Inspection every 3–4 days',popular:true,
   features:['Everything in Essential','Inspection every 3–4 days','Detailed photo report','Timestamped inspection history','Priority issue notification','Insurance-friendly documentation']},
  {id:'estate',name:'Total Estate Protection',price:99.95,freq:'Inspection frequency based on your home insurance requirements, up to every 3 days',popular:false,
   features:['Everything in Preferred','Inspection frequency based on insurance requirements, up to every 3 days','Priority scheduling','Immediate phone notification of urgent findings','Emergency contact notification if owner unreachable','Additional weather & storm response checks','Enhanced inspection documentation']}
];

function render(html){document.getElementById('screen').innerHTML=html;}

function stepDots(current,total){
  var h='<div class="step-indicator">';
  for(var i=1;i<=total;i++) h+='<div class="step-dot'+(i<current?' done':i===current?' active':'')+'" ></div>';
  return h+'</div>';
}

function ff(label,type,id,ph,val){return '<div class="lbl">'+label+'</div><input class="inp" type="'+type+'" id="'+id+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'">';}
function fs(label,id,opts,val){
  var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');
  return '<div class="lbl">'+label+'</div><select class="sel" id="'+id+'">'+o+'</select>';
}

// ── WELCOME ───────────────────────────────────────────────────────────────
function showWelcome(){
  render(
    '<div class="welcome-bg" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 0 40px;min-height:100vh">'
    +'<div style="width:100%;padding:0 32px;display:flex;flex-direction:column;gap:12px">'
    +'<button class="btn-gold" onclick="showRoleSelector()">Get Started</button>'
    +'<button class="btn-outline-gold" onclick="showLogin()">Sign In</button>'
    +'<button id="androidInstallBtn" onclick="triggerInstall()" style="display:none;width:100%;background:transparent;border:1px solid var(--gold);border-radius:1px;color:var(--gold);font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:0">&#128247; Add to Home Screen</button>'
    +'</div></div>'
  );
}

// ── ROLE SELECTOR ─────────────────────────────────────────────────────────
function showRoleSelector(){
  render(
    '<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="showWelcome()">&#8592;</button><div><div class="topbar-title">Welcome</div><div class="topbar-sub">Tell us who you are</div></div></div></div>'
    +'<div class="sc" style="display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 60px);padding:24px">'
    +'<div style="font-family:var(--ff);font-size:22px;color:var(--gl);text-align:center;margin-bottom:6px">Who are you signing up as?</div>'
    +'<div style="font-size:10px;color:var(--dim);letter-spacing:2px;text-align:center;text-transform:uppercase;margin-bottom:32px">Select your role to continue</div>'

    +'<div id="roleClient" onclick="selectRole(\'client\')" class="card tap" style="display:flex;align-items:center;gap:16px;margin-bottom:12px;cursor:pointer;border:2px solid var(--border);padding:20px;transition:border-color .2s">'
    +'<div style="width:48px;height:48px;border-radius:50%;background:var(--gd);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">&#127968;</div>'
    +'<div><div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">Client</div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.6">I have a property that requires professional oversight</div>'
    +'</div></div>'

    +'<div id="roleManager" onclick="selectRole(\'manager\')" class="card tap" style="display:flex;align-items:center;gap:16px;margin-bottom:32px;cursor:pointer;border:2px solid var(--border);padding:20px;transition:border-color .2s">'
    +'<div style="width:48px;height:48px;border-radius:50%;background:var(--gd);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">&#127970;</div>'
    +'<div><div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">Manager</div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.6">I operate a property monitoring company</div>'
    +'</div></div>'

    +'<button id="roleContinue" class="btn-gold" style="opacity:.4;pointer-events:none" onclick="continueFromRole()">Continue</button>'
    +'</div>'
  );
  window._selectedRole=null;
}

function selectRole(role){
  window._selectedRole=role;
  ['roleClient','roleManager'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.borderColor='var(--border)';
  });
  var sel=document.getElementById('role'+role.charAt(0).toUpperCase()+role.slice(1));
  if(sel) sel.style.borderColor='var(--gold)';
  var btn=document.getElementById('roleContinue');
  if(btn){btn.style.opacity='1';btn.style.pointerEvents='auto';}
}

function continueFromRole(){
  if(!window._selectedRole) return;
  if(window._selectedRole==='client') showTiers();
  else if(window._selectedRole==='manager') showManagerSignup();
}

function showManagerSignup(){
  render(
    '<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="showRoleSelector()">&#8592;</button><div><div class="topbar-title">Manager Sign Up</div><div class="topbar-sub">Create your company account</div></div></div></div>'
    +'<div class="sc">'
    +'<div class="card" style="margin-bottom:16px;background:rgba(201,168,76,0.06);border-color:var(--border)">'
    +'<div style="font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Pending Approval</div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.7">Your account will be reviewed and activated by EstateCare before you can log in. You will receive an email once approved.</div>'
    +'</div>'
    +ff('Full Name','text','mgName','Your full name','')
    +ff('Email','email','mgEmail','company@email.com','')
    +ff('Password','password','mgPass','Create a password','')
    +ff('Company Name','text','mgCompany','Your business name','')
    +ff('Phone','tel','mgPhone','','')
    +ff('Region / City','text','mgRegion','e.g. Kelowna, BC','')
    +'<div id="mgErr" style="display:none;font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:10px">Please fill in all required fields.</div>'
    +'<button class="btn-gold" style="margin-top:8px" onclick="submitManagerSignup()">Request Access</button>'
    +'<button class="btn-ghost" onclick="showRoleSelector()">&#8592; Back</button>'
    +'</div>'
  );
}

function submitManagerSignup(){
  var name=document.getElementById('mgName').value.trim();
  var email=document.getElementById('mgEmail').value.trim();
  var pass=document.getElementById('mgPass').value;
  var company=document.getElementById('mgCompany').value.trim();
  if(!name||!email||!pass||!company){document.getElementById('mgErr').style.display='block';return;}
  render(
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;min-height:100vh">'
    +'<div style="width:72px;height:72px;border-radius:50%;background:rgba(76,175,125,.12);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:24px">&#10003;</div>'
    +'<div style="font-family:var(--ff);font-size:26px;color:var(--gl);margin-bottom:8px">Request Submitted</div>'
    +'<div class="gold-line"></div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.9;margin-top:16px">Thank you, '+name+'.<br>We will review your application and<br>contact you at <span style="color:var(--gold)">'+email+'</span><br>within 1–2 business days.</div>'
    +'<button class="btn-ghost" style="margin-top:32px;max-width:300px" onclick="showWelcome()">Back to Home</button>'
    +'</div>'
  );
}

// ── TIERS ─────────────────────────────────────────────────────────────────
function billBtn(val,label,sub){

// ── STEP 4 — WALK-THROUGH CALENDAR ───────────────────────────────────────
var calMonth=new Date();
calMonth.setDate(1);

function goToCalendar(){
  renderCalendar();
}

function renderCalendar(){
  var today=new Date();
  var y=calMonth.getFullYear(),m=calMonth.getMonth();
  var mn=calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var fd=new Date(y,m,1).getDay();
  var dim=new Date(y,m+1,0).getDate();

  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="goToProperty()">&#8592;</button><div><div class="topbar-title">Schedule Walk-Through</div><div class="topbar-sub">Step 4 of 4 &nbsp;&#183;&nbsp; Free</div></div></div></div>'
    +'<div class="sc">'+stepDots(4,4)
    +'<div style="font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:16px">Select a date for your free Property Walk-Through. Our team will visit your home, assess your needs, and recommend the right service plan.</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<button onclick="shiftMonth(-1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8249;</button>'
    +'<div style="font-family:var(--ff);font-size:18px;color:var(--gl)">'+mn+'</div>'
    +'<button onclick="shiftMonth(1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8250;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">';
  ['S','M','T','W','T','F','S'].forEach(function(d){html+='<div style="text-align:center;font-size:9px;color:var(--dim);padding:4px">'+d+'</div>';});
  html+='</div><div class="cal-grid">';

  for(var i=0;i<fd;i++) html+='<div></div>';
  for(var d=1;d<=dim;d++){
    var thisDate=new Date(y,m,d);
    var ds=thisDate.toDateString();
    var isPast=thisDate<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    var isWeekend=thisDate.getDay()===0||thisDate.getDay()===6;
    var bookingsForDay=existingBookings.filter(function(b){return b.date===ds;}).length;
    var isFull=bookingsForDay>=2;
    var isAvail=!isPast&&!isWeekend&&!isFull;
    var isSelected=signup.walkDate===ds;
    var isToday=ds===today.toDateString();

    var cls='cal-day'+(isPast||isWeekend?' past':isSelected?' selected':isAvail?' available':isFull?' past':'');
    html+='<div class="'+cls+'" '+(isAvail||isSelected?'data-date="'+ds+'" data-action="pickDate"':'')+' style="'+(isToday?'border-color:rgba(201,168,76,0.5)':'')+'">'
      +'<div style="font-size:11px;color:'+(isSelected?'var(--gold)':isToday?'var(--gold)':'var(--dim)')+'">'+d+'</div>'
      +(isAvail&&!isSelected?'<div style="font-size:7px;color:var(--green);margin-top:2px">Avail</div>':'')
      +(isSelected?'<div style="font-size:7px;color:var(--gold);margin-top:2px">&#10003;</div>':'')
      +(isFull&&!isPast&&!isWeekend?'<div style="font-size:7px;color:var(--dim);margin-top:2px">Full</div>':'')
      +'</div>';
  }
  html+='</div>';

  if(signup.walkDate){
    var bookedAM=existingBookings.some(function(b){return b.date===signup.walkDate&&b.time==='9:00 AM';});
    var bookedPM=existingBookings.some(function(b){return b.date===signup.walkDate&&b.time==='1:00 PM';});
    var selDate=new Date(signup.walkDate).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    html+='<div style="font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:16px 0 10px">Available Times — '+selDate+'</div>';
    html+='<div class="time-slot'+(bookedAM?' full':signup.walkTime==='9:00 AM'?' selected':'')+'" data-time="9:00 AM" data-action="pickTime">'
      +'<div><div style="font-size:14px;font-weight:500">9:00 AM</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Morning appointment</div></div>'
      +'<div style="font-size:11px;color:'+(bookedAM?'var(--dim)':signup.walkTime==='9:00 AM'?'var(--gold)':'var(--green)')+'">'+( bookedAM?'Unavailable':signup.walkTime==='9:00 AM'?'&#10003; Selected':'Available')+'</div></div>';
    html+='<div class="time-slot'+(bookedPM?' full':signup.walkTime==='1:00 PM'?' selected':'')+'" data-time="1:00 PM" data-action="pickTime">'
      +'<div><div style="font-size:14px;font-weight:500">1:00 PM</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Afternoon appointment</div></div>'
      +'<div style="font-size:11px;color:'+(bookedPM?'var(--dim)':signup.walkTime==='1:00 PM'?'var(--gold)':'var(--green)')+'">'+( bookedPM?'Unavailable':signup.walkTime==='1:00 PM'?'&#10003; Selected':'Available')+'</div></div>';
  }

  var canConfirm=signup.walkDate&&signup.walkTime;
  html+='<div id="calErr" class="err">Please select a date and time.</div>'
    +'<button class="btn-gold" style="margin-top:16px;opacity:'+(canConfirm?'1':'.5')+'" onclick="confirmSignup()">Confirm &amp; Create Account</button>'
    +'<button class="btn-ghost" onclick="goToProperty()">&#8592; Back</button>'
    +'</div>';

  render(html);
  document.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-action');
      if(a==='pickDate'){signup.walkDate=this.getAttribute('data-date');signup.walkTime=null;renderCalendar();}
      else if(a==='pickTime'){signup.walkTime=this.getAttribute('data-time');renderCalendar();}
    });
  });
}

function shiftMonth(dir){
  calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+dir,1);
  renderCalendar();
}

  var user=users.find(function(u){return u.email===email&&u.password===pass;});
  if(!user){document.getElementById('loginErr').style.display='block';return;}
  localStorage.setItem('ec_user',JSON.stringify(user));
  // Show PWA banner after they land on their dashboard (stored for next page)
  sessionStorage.removeItem('pwa_dismissed');
  if(user.role==='admin') window.location.href=base+'admin.html';
  else if(user.role==='inspector') window.location.href=base+'inspector.html';
  else if(user.role==='manager') window.location.href=base+'manager.html';
  else window.location.href=base+'client.html';
}

// Detect staff-assisted client signup (manager adding a client)
window._staffSignupMode=new URLSearchParams(window.location.search).get('staffAdd')==='client';
if(window._staffSignupMode){
  showTiers();
} else {
  showWelcome();
}

// PWA banner - called after login, not on welcome screen
function checkShowPWA(){
  if(window.navigator.standalone===true) return;
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var isAndroid=/Android/.test(navigator.userAgent);
  if(!isIOS&&!isAndroid) return;
  // Only show if not dismissed this session
  if(sessionStorage.getItem('pwa_dismissed')) return;
  setTimeout(function(){
    document.getElementById('pwaBanner').classList.add('show');
  }, 3000);
}

function triggerInstall(){
  if(_pwaPrompt){
    _pwaPrompt.prompt();
    _pwaPrompt.userChoice.then(function(r){
      if(r.outcome==='accepted') showToast('Installing EstateCare...');
      _pwaPrompt=null;
    });
  } else {
    showPwaSteps();
  }
}

function showPwaSteps(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var steps=document.getElementById('pwaSteps');
  var html='';
  if(isIOS){
    html='<div class="pwa-step"><div class="pwa-step-num">1</div><span>Tap the <b style="color:var(--gold)">Share</b> button at the bottom of Safari (box with arrow)</span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">2</div><span>Scroll down and tap <b style="color:var(--gold)">Add to Home Screen</b></span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">3</div><span>Tap <b style="color:var(--gold)">Add</b> in the top right corner</span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">&#10003;</div><span style="color:var(--green)">EstateCare will appear on your home screen!</span></div>';
  } else {
    html='<div class="pwa-step"><div class="pwa-step-num">1</div><span>Tap the <b style="color:var(--gold)">three dots menu</b> in Chrome (top right)</span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">2</div><span>Tap <b style="color:var(--gold)">Add to Home Screen</b></span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">3</div><span>Tap <b style="color:var(--gold)">Add</b> to confirm</span></div>'
      +'<div class="pwa-step"><div class="pwa-step-num">&#10003;</div><span style="color:var(--green)">EstateCare will appear on your home screen!</span></div>';
  }
  steps.innerHTML=html;
  steps.classList.add('show');
  document.getElementById('pwaInstallBtn').textContent='Got it!';
  document.getElementById('pwaInstallBtn').onclick=dismissPwa;
}

function dismissPwa(){
  sessionStorage.setItem('pwa_dismissed','1');
  document.getElementById('pwaBanner').classList.remove('show');
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(r){r.update();}).catch(function(e){});
  });
}
</script>

<div class="pwa-banner" id="pwaBanner">
  <div class="pwa-banner-row">
    <div class="pwa-banner-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
    <div class="pwa-banner-text">
      <div class="pwa-banner-title">Add EstateCare to Home Screen</div>
      <div class="pwa-banner-sub">One tap access — no app store needed</div>
    </div>
    <button class="pwa-btn" id="pwaInstallBtn" onclick="showPwaSteps()">How To</button>
    <button class="pwa-dismiss" onclick="dismissPwa()">&#215;</button>
  </div>
  <div class="pwa-steps" id="pwaSteps"></div>
</div>
</body>
</html>
