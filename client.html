*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
:root{--black:#0a0a0a;--ch:#141414;--ch2:#1c1c1c;--ch3:#242424;--gold:#c9a84c;--gl:#e2c97e;--gd:rgba(201,168,76,0.15);--green:#4caf7d;--yellow:#e6b84a;--red:#e05c5c;--text:#f0ece4;--dim:#9a9488;--border:rgba(201,168,76,0.2);--ff:"Cormorant Garamond",serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--black);font-family:'Montserrat',sans-serif;font-weight:300;color:var(--text);}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
#screen::-webkit-scrollbar{width:3px;}
#screen::-webkit-scrollbar-thumb{background:var(--gd);}
.topbar{background:var(--ch);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:var(--ff);font-size:22px;letter-spacing:2px;color:var(--gl);}
.topbar-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gd);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);cursor:pointer;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:22px;line-height:1;padding:0;margin-right:12px;}
.sc{flex:1;padding:20px;overflow-y:auto;}
.sec{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;margin-top:4px;}
.card{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:10px;}
.card.tap{cursor:pointer;transition:border-color .2s;}
.card.tap:hover{border-color:var(--gold);}
.pbar-wrap{background:var(--ch3);border-radius:10px;height:5px;overflow:hidden;margin-top:6px;}
.pbar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--gl));}
.cat-ico{width:38px;height:38px;border-radius:50%;background:var(--gd);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cstat{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cs-g{background:var(--green);box-shadow:0 0 5px var(--green);}
.cs-y{background:var(--yellow);box-shadow:0 0 5px var(--yellow);}
.cs-r{background:var(--red);box-shadow:0 0 5px var(--red);}
.cs-p{background:var(--ch3);border:1px solid var(--dim);}
.ring-bg{fill:none;stroke:var(--ch3);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;}
.ring-score{font-family:var(--ff);font-size:26px;fill:var(--gl);}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sname{font-size:10px;letter-spacing:1px;color:var(--dim);flex:1;text-transform:uppercase;}
.sval{font-size:15px;font-family:var(--ff);}
.point-card{background:var(--ch2);border:1px solid var(--border);border-radius:2px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.point-card.tappable{cursor:pointer;transition:border-color .2s;}
.point-card.tappable:hover{border-color:var(--gold);}
.locked-banner{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:2px;padding:10px 14px;font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.sbtn{width:32px;height:32px;border-radius:50%;border:2px solid var(--ch3);background:var(--ch3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.sbtn.g{border-color:var(--green);background:rgba(76,175,125,.15);}
.sbtn.y{border-color:var(--yellow);background:rgba(230,184,74,.15);}
.sbtn.r{border-color:var(--red);background:rgba(224,92,92,.15);}
.trio{display:flex;gap:6px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--ch);border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;padding:24px 20px 36px;width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:var(--ff);font-size:20px;color:var(--gl);margin-bottom:4px;}
.modal-sub{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:16px;}
.pd-status{display:inline-flex;align-items:center;gap:8px;border-radius:20px;padding:4px 14px;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:1px;color:#000;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:13px;cursor:pointer;margin-top:8px;}
.btn-ghost{width:100%;background:transparent;border:1px solid var(--border);border-radius:1px;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:11px;cursor:pointer;margin-top:8px;}

.bnav{background:var(--ch);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;color:var(--dim);font-size:8px;letter-spacing:1px;text-transform:uppercase;gap:4px;border:none;background:none;font-family:'Montserrat',sans-serif;}
.ni.active{color:var(--gold);}
.ni span{font-size:16px;}

</style>
</head>

function scoreOf(pts){var g=0,y=0,r=0,t=pts.length;pts.forEach(function(p){if(p.status==='green')g++;else if(p.status==='yellow')y++;else if(p.status==='red')r++;});return{score:t>0?Math.round(((g*2+y)/(t*2))*100):0,green:g,yellow:y,red:r,total:t};}

    +'<button class="ni'+(active==='home'?' active':'')+'" data-action="cnav" data-fn="goDashboard"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>My Home</button>'
    +'<button class="ni'+(active==='inspections'?' active':'')+'" data-action="cnav" data-fn="goInspectionHistory"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>Inspections</button>'
    +'<button class="ni'+(active==='invoices'?' active':'')+'" data-action="cnav" data-fn="goClientInvoices"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>Invoices</button>'
    +'<button class="ni'+(active==='contact'?' active':'')+'" data-action="cnav" data-fn="goContact"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 012 2.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.09-1.09a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></span>Contact</button>'

function showToast(msg){var t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ch);border:1px solid var(--gold);border-radius:2px;padding:10px 20px;font-size:11px;color:var(--gl);z-index:200;white-space:nowrap';document.body.appendChild(t);setTimeout(function(){document.body.removeChild(t);},2200);}

function render(html){
  document.getElementById('screen').innerHTML=html;
  document.querySelectorAll('[data-action="cnav"]').forEach(function(el){
    el.addEventListener('click',function(){var fn=this.getAttribute('data-fn');if(fn&&window[fn])window[fn]();});
  });
  document.querySelectorAll('[data-action="payopt"]').forEach(function(el){
    el.addEventListener('click',function(){showPayContact(this.getAttribute('data-paymethod'));});
  });
  document.querySelectorAll('[data-action="openDetail"]').forEach(function(el){
    el.addEventListener('click',function(){openDateDetail(this.getAttribute('data-key'));});
  });
  document.querySelectorAll('[data-action="openCat"]').forEach(function(el){
    el.addEventListener('click',function(){openCat(this.getAttribute('data-cat'),this.getAttribute('data-key'));});
  });
  document.querySelectorAll('[data-action="openPD"]').forEach(function(el){
    el.addEventListener('click',function(){openPD(parseInt(this.getAttribute('data-idx')));});
  });
}

// Delegated invoice click — manual walk for max compatibility
document.getElementById('screen').addEventListener('click',function(e){
  var t=e.target;
  while(t&&t!==document.getElementById('screen')){
    if(t.getAttribute&&t.getAttribute('data-invid')){openInvoice(t.getAttribute('data-invid'));return;}
    t=t.parentNode;
  }
});

function ringHtml(sc,sz){sz=sz||90;var off=226-(226*sc.score/100);return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 90 90"><circle class="ring-bg" cx="45" cy="45" r="36"/><circle class="ring-fill" cx="45" cy="45" r="36" stroke="#c9a84c" stroke-dasharray="226" stroke-dashoffset="'+off+'" transform="rotate(-90 45 45)"/><text class="ring-score" x="45" y="50" text-anchor="middle">'+sc.score+'%</text></svg>';}
function statsHtml(sc){return '<div style="flex:1"><div class="stat-row"><div class="sdot" style="background:var(--green)"></div><div class="sname">Healthy</div><div class="sval">'+sc.green+'</div></div><div class="stat-row"><div class="sdot" style="background:var(--yellow)"></div><div class="sname">Monitor</div><div class="sval">'+sc.yellow+'</div></div><div class="stat-row"><div class="sdot" style="background:var(--red)"></div><div class="sname">Attention</div><div class="sval">'+sc.red+'</div></div></div>';}

// ── PROPERTY LIST (if client has multiple) ────────────────────────────────
function goHome(){
  var myEstates=estates.filter(function(e){return e.clientEmail===currentUser.email;});
  if(myEstates.length===1){curEstateId=myEstates[0].id;goDashboard();return;}
  var html='<div class="topbar"><div><div class="topbar-title">My Properties</div><div class="topbar-sub">EstateCare</div></div><div class="avatar" onclick="goClientProfile()">'+currentUser.initials+'</div></div>'
    +'<div class="sc">';
  myEstates.forEach(function(e){
    var sc=liveScore(e);
    html+='<div class="card tap" data-action="openEstate" data-id="'+e.id+'" style="display:flex;align-items:center;gap:12px">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-family:var(--ff);font-size:18px;color:var(--gl)">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div></div>'
      +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+sc.score+'%</div></div>';
  });
  html+='<button class="btn-ghost" onclick="doSignOut()">Sign Out</button></div>';
  render(html);
}

// ── CLIENT DASHBOARD ──────────────────────────────────────────────────────
function goDashboard(){
  var e=CE();if(!e)return;
  var all=[];Object.values(e.data).forEach(function(cc){all=all.concat(cc.points);});
  if(all.length===0&&!e.completedAt&&e.pastInspections.length===0){
    showNewClientDash(e);return;
  }
  showFullDashboard(e);
}

  var walkDate=con.walkThrough?new Date(con.walkThrough.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'To be scheduled';
  var walkTime=con.walkThrough?con.walkThrough.time:'';
  var tierName=con.tier?con.tier.charAt(0).toUpperCase()+con.tier.slice(1):'Pending';

  var html='<div class="topbar"><div><div class="topbar-title">'+e.name+'</div><div class="topbar-sub">My Property</div></div><div class="avatar" onclick="goClientProfile()">'+currentUser.initials+'</div></div>'
    +'<div class="sc">'
    +'<div class="card" style="text-align:center;padding:32px 20px;border-color:var(--gold)">'
    +'<div style="font-size:32px;margin-bottom:12px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>'
    +'<div style="font-family:var(--ff);font-size:24px;color:var(--gl);margin-bottom:8px">Welcome to EstateCare</div>'
    +'<div style="font-size:11px;color:var(--dim);line-height:1.8">Your account is active.<br>Service begins after your Property Walk-Through.</div>'
    +'</div>'
    +'<div class="card" style="border-color:var(--green)">'
    +'<div style="font-size:9px;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">&#10003; Property Walk-Through Scheduled</div>'
    +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+walkDate+'</div>'
    +'<div style="font-size:14px;color:var(--text);margin-top:4px">'+walkTime+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:10px;line-height:1.7">Our team will visit your property, complete a full walkthrough and activate your service plan.</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Your Service Plan</div>'
    +'<div style="font-size:16px;color:var(--gold);font-weight:500">'+tierName+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:4px">'+(con.tier?'Service activates after your walk-through':'Your inspector will recommend the best plan for your property')+'</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Your Property</div>'
    +'<div style="font-size:14px;color:var(--text)">'+e.name+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:4px">'+e.address+'</div>'
    +'</div>'
    +'</div>'+clientNav('home');
  document.getElementById('screen').innerHTML=html;
  document.querySelectorAll('[data-action="cnav"]').forEach(function(el){
    el.addEventListener('click',function(){var fn=this.getAttribute('data-fn');if(fn&&window[fn])window[fn]();});
  });
  document.querySelectorAll('[data-invid]').forEach(function(el){
    el.addEventListener('click',function(){openInvoice(this.getAttribute('data-invid'));});
  });
  document.querySelectorAll('[data-action="payopt"]').forEach(function(el){
    el.addEventListener('click',function(){showPayContact(this.getAttribute('data-paymethod'));});
  });
}
function showFullDashboard(){
  var e=CE();if(!e)return;
  var sc=liveScore(e);
  var con=e.contract;
  var completed=e.pastInspections.length+(e.completedAt?1:0);
  var remaining=con?(con.totalInspections-completed):0;
  var pct=con&&con.totalInspections>0?Math.round(completed/con.totalInspections*100):0;
  var nextD=con&&con.nextInspection?new Date(con.nextInspection).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):'—';
  var lastD=e.completedAt?new Date(e.completedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):null;

  var issues=[];
  Object.values(e.data).forEach(function(cat){
    cat.points.forEach(function(p){
      if(p.status==='red'||p.status==='yellow') issues.push({name:p.name,status:p.status,notes:p.notes,cat:cat.label});
    });
  });

  var myInvoices=clientInvoices||[];
  var hasUnpaid=myInvoices.some(function(i){return i.status==='unpaid';});
  var unpaidAmt=myInvoices.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);
  var acctCol=hasUnpaid?'#e05c5c':'#4caf7d';
  var acctLabel=hasUnpaid?'Balance Due — $'+unpaidAmt.toFixed(2):'Account Up to Date';
  var acctIcon=hasUnpaid?'&#9888;':'&#10003;';

  var html='<div class="topbar"><div><div class="topbar-title">'+e.name+'</div><div class="topbar-sub">My Property</div></div><div class="avatar" onclick="goClientProfile()">'+currentUser.initials+'</div></div>'
    +'<div class="sc">'
    +'<div onclick="goClientInvoices(\'unpaid\')" style="display:flex;align-items:center;justify-content:space-between;background:'+acctCol+'18;border:1px solid '+acctCol+';border-radius:2px;padding:10px 14px;margin-bottom:12px;cursor:pointer">'
    +'<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;color:'+acctCol+'">'+acctIcon+'</span><span style="font-size:11px;font-weight:500;color:'+acctCol+'">'+acctLabel+'</span></div>'
    +'<span style="font-size:11px;color:'+acctCol+'">&#8250;</span>'
    +'</div>'
    +'<div class="card" style="margin-bottom:16px">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px">Current Estate Health</div>'
    +'<div style="display:flex;align-items:center;gap:20px">'+ringHtml(sc)+statsHtml(sc)+'</div>'
    +(lastD?'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">Last Inspection: <span style="color:var(--text)">'+lastD+'</span></div>':'')
    +'</div>';

  if(con){
    html+='<div class="card" style="margin-bottom:16px">'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Next Inspection</div>'
      +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+nextD+'</div>'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:16px;margin-bottom:6px">Service Progress</div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px"><span>'+completed+' of '+con.totalInspections+' inspections</span><span>'+pct+'%</span></div>'
      +'<div class="pbar-wrap" style="height:6px"><div class="pbar" style="width:'+pct+'%"></div></div>'
      +'<div style="display:flex;justify-content:space-between;margin-top:12px">'
      +'<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Remaining</div><div style="font-family:var(--ff);font-size:24px">'+remaining+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Service Tier</div><div style="font-size:14px;color:var(--gold);margin-top:6px">'+con.tier+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">Contract End</div><div style="font-size:12px;color:var(--text);margin-top:6px">'+new Date(con.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div>'
      +'</div></div>';
  }

  if(issues.length){
    html+='<div class="sec">Active Issues ('+issues.length+')</div>';
    issues.forEach(function(iss,i){
      var col=iss.status==='red'?'var(--red)':'var(--yellow)';
      html+='<div class="card" style="border-left:3px solid '+col+';padding-left:14px;cursor:pointer" data-action="openPD" data-idx="'+i+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div style="font-size:12px;font-weight:500">'+iss.name+'</div>'
        +'<div style="font-size:9px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:1px">'+iss.cat+'</div>'
        +(iss.notes?'<div style="font-size:11px;color:var(--dim);margin-top:6px;font-style:italic">&quot;'+iss.notes+'&quot;</div>':'')
        +'</div>'
        +'<div style="font-size:9px;color:'+col+';letter-spacing:1px;text-transform:uppercase;flex-shrink:0;margin-left:10px">'+iss.status+'<br><span style="font-size:8px;color:var(--dim)">Tap for details</span></div>'
        +'</div></div>';
      window['_issue_'+i]=iss;
    });
  }

  html+='<div class="sec" style="margin-top:4px">Inspection History</div>';

  if(e.completedAt){
    var ds=new Date(e.completedAt).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
    html+=dateCard('live',ds,'&#10003; Completed',sc,false);
  }
  e.pastInspections.slice().reverse().forEach(function(insp,i){
    var idx=e.pastInspections.length-1-i;
    var ds2=insp.completedAt?new Date(insp.completedAt).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'}):'Past';
    var sc2=insp.snapshot?scoreOf(Object.values(insp.snapshot).reduce(function(a,c){return a.concat(c.points);},[])):scoreOf([]);
    html+=dateCard(idx,ds2,'&#10003; Completed',sc2,false);
  });

  html+='<button class="btn-ghost" onclick="doSignOut()" style="margin-top:8px;margin-bottom:8px">Sign Out</button>'
    +'</div>'+clientNav('home');
  render(html);
}

function dateCard(key,dateStr,sub,sc,isCurrent){
  return '<div class="card tap" data-action="openDetail" data-key="'+key+'" style="display:flex;align-items:center;gap:14px;'+(isCurrent?'border-color:var(--yellow)':'')+'">'
    +'<div style="flex:1"><div style="font-size:13px">'+dateStr+'</div>'
    +'<div style="font-size:9px;color:'+(isCurrent?'var(--yellow)':'var(--green)')+';letter-spacing:1.5px;text-transform:uppercase;margin-top:3px">'+sub+'</div>'
    +'<div style="display:flex;gap:5px;align-items:center;margin-top:6px">'
    +'<div style="width:7px;height:7px;border-radius:50%;background:var(--green)"></div><span style="font-size:9px;color:var(--dim);margin-right:6px">'+sc.green+'</span>'
    +'<div style="width:7px;height:7px;border-radius:50%;background:var(--yellow)"></div><span style="font-size:9px;color:var(--dim);margin-right:6px">'+sc.yellow+'</span>'
    +'<div style="width:7px;height:7px;border-radius:50%;background:var(--red)"></div><span style="font-size:9px;color:var(--dim)">'+sc.red+'</span>'
    +'</div></div>'
    +'<div style="text-align:right"><div style="font-family:var(--ff);font-size:22px;color:var(--gl)">'+sc.score+'%</div>'
    +'<div style="font-size:9px;color:var(--dim);margin-top:4px">View &#8250;</div></div></div>';
}

// ── INSPECTION DETAIL (date → categories) ────────────────────────────────
function openDateDetail(key){
  selKey=key;
  var e=CE();
  var isLive=(key==='live'||key===null);
  var isComp=!!e.completedAt;
  var snap=isLive?null:(e.pastInspections[parseInt(key)]?e.pastInspections[parseInt(key)].snapshot:null);
  var sc=isLive?liveScore(e):(snap?scoreOf(Object.values(snap).reduce(function(a,c){return a.concat(c.points);},[])):scoreOf([]));
  var dateLabel=isLive?(isComp?new Date(e.completedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'Current Inspection')
    :(e.pastInspections[parseInt(key)]&&e.pastInspections[parseInt(key)].completedAt?new Date(e.pastInspections[parseInt(key)].completedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'Past');

  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="goDashboard()">&#8592;</button><div><div class="topbar-title">'+e.name+'</div><div class="topbar-sub">'+dateLabel+'</div></div></div><div class="avatar">'+currentUser.initials+'</div></div>'
    +'<div class="sc">'
    +'<div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:16px">'+ringHtml(sc,70)+statsHtml(sc)+'</div>'
    +'<div class="sec">Categories</div>';

  var cats=[{k:'exterior',ico:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>'},{k:'interior',ico:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'},{k:'grounds',ico:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M5 12H2a10 10 0 0020 0h-3"/><path d="M12 12a5 5 0 000-10 5 5 0 000 10z"/></svg>'}];
  cats.forEach(function(cat){
    var pts,label,cs;
    if(isLive){
      var c=e.data[cat.k];pts=c.points;label=c.label;
    } else if(snap&&snap[cat.k]){
      pts=snap[cat.k].points;label=snap[cat.k].label;
    } else return;
    var hasR=pts.some(function(p){return p.status==='red';});
    var hasY=pts.some(function(p){return p.status==='yellow';});
    var allG=pts.every(function(p){return p.status==='green';});
    cs=hasR?'cs-r':hasY?'cs-y':allG?'cs-g':'cs-p';
    html+='<div class="card tap" data-action="openCat" data-cat="'+cat.k+'" data-key="'+key+'">'
      +'<div style="display:flex;align-items:center;gap:14px">'
      +'<div class="cat-ico">'+cat.ico+'</div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500;letter-spacing:1px;margin-bottom:4px">'+label+'</div>'
      +'<div style="font-size:10px;color:var(--dim)">'+(hasR?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Attention required':hasY?'&#9679; Monitor items':'&#10003; All clear')+'</div>'
      +'<div style="font-size:9px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px">&#10003; Signed &amp; Locked</div>'
      +'</div><div class="cstat '+cs+'"></div></div></div>';
  });
  html+='</div>';
  render(html);
}

// ── CATEGORY POINTS (read-only for client) ────────────────────────────────
function openCat(cat,key){
  var e=CE();
  var isLive=(key==='live'||key===null);
  var pts,label;
  if(isLive){var c=e.data[cat];pts=c.points;label=c.label;}
  else{var snap=e.pastInspections[parseInt(key)].snapshot;pts=snap[cat].points;label=snap[cat].label;}

  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="openDateDetail(\''+key+'\')">&#8592;</button><div><div class="topbar-title">'+label+'</div><div class="topbar-sub">'+e.name+'</div></div></div><div class="avatar">'+currentUser.initials+'</div></div>'
    +'<div class="sc">'

function renderInvoiceMonths(filterStatus){
  var myInvoices=clientInvoices;
  var filtered=filterStatus==='all'?myInvoices:myInvoices.filter(function(i){return i.status===filterStatus;});
  if(!filtered.length) return '<div style="font-size:11px;color:var(--dim);text-align:center;padding:20px">No invoices found</div>';

  // Group by month/year
  var months={};
  filtered.forEach(function(inv){
    var d=new Date(inv.dueDate);
    var key=d.getFullYear()+'-'+d.getMonth();
    if(!months[key]) months[key]=[];
    months[key].push(inv);
  });

  var sortedKeys=Object.keys(months).sort(function(a,b){
    var da=a.split('-'),db=b.split('-');
    return new Date(db[0],db[1])-new Date(da[0],da[1]);
  });

  var html='';
  sortedKeys.forEach(function(key){
    var parts=key.split('-');
    var monthDate=new Date(parts[0],parts[1]);
    var monthLabel=monthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    var monthInvoices=months[key];
    var monthTotal=monthInvoices.reduce(function(s,i){return s+i.amount;},0);
    var hasUnpaid=monthInvoices.some(function(i){return i.status==='unpaid';});
    var allPaid=monthInvoices.every(function(i){return i.status==='paid';});
    var col=hasUnpaid?'var(--red)':allPaid?'var(--green)':'var(--gold)';

    html+='<div class="card tap" onclick="goInvoiceMonth(\''+key+'\',\''+filterStatus+'\')" style="border-left:3px solid '+col+';margin-bottom:8px;cursor:pointer">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:14px;font-weight:500">'+monthLabel+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:3px">'+monthInvoices.length+' invoice'+(monthInvoices.length===1?'':'s')+'</div></div>'
      +'<div style="text-align:right"><div style="font-family:var(--ff);font-size:20px;color:var(--gl)">$'+monthTotal.toFixed(2)+'</div>'
      +'<div style="font-size:9px;color:var(--dim);margin-top:4px">View &#8250;</div></div>'
      +'</div></div>';
  });
  return html;
}

function goInvoiceMonth(key,filterStatus){
  var parts=key.split('-');
  var monthDate=new Date(parts[0],parts[1]);
  var monthLabel=monthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var monthInvoices=clientInvoices.filter(function(i){
    var d=new Date(i.dueDate);
    return d.getFullYear()===parseInt(parts[0])&&d.getMonth()===parseInt(parts[1])
      &&(filterStatus==='all'||i.status===filterStatus);
  }).sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate);});

  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="goClientInvoices(\''+filterStatus+'\')">&#8592;</button><div><div class="topbar-title">'+monthLabel+'</div><div class="topbar-sub">Invoices</div></div></div><div class="avatar">'+currentUser.initials+'</div></div>'
    +'<div class="sc">';

  monthInvoices.forEach(function(inv){
    var isPaidRow=(inv.status==='paid'||inv.autoPay);
    var col=isPaidRow?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    var statusLabel=isPaidRow?'paid':inv.status;
    var dueStr=new Date(inv.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    window['_inv_'+inv.id]=inv;
    html+='<div class="card tap" onclick="openInvoice(\''+inv.id+'\')" style="border-left:3px solid '+col+';margin-bottom:8px;cursor:pointer">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div style="flex:1">'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px">'+inv.invoiceNum+'</div>'
      +'<div style="font-size:13px;font-weight:500">'+inv.notes+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+inv.period+' &nbsp;&#183;&nbsp; Due '+dueStr+'</div>'
      +(inv.autoPay?'<div style="font-size:9px;color:var(--green);margin-top:3px">&#10003; Auto-Pay</div>':'')
      +(inv.paidDate&&!inv.autoPay?'<div style="font-size:9px;color:var(--green);margin-top:2px">&#10003; Paid'+(inv.paymentMethod?' via '+inv.paymentMethod:'')+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;margin-left:12px">'
      +'<div style="font-family:var(--ff);font-size:22px;color:var(--gl)">$'+inv.amount.toFixed(2)+'</div>'

function filterClientInvoices(v){
  var statusFilter=window._invClientFilter||'all';
  var base=statusFilter==='all'?clientInvoices:clientInvoices.filter(function(i){return i.status===statusFilter;});
  var filtered=base.filter(function(i){
    return i.notes.toLowerCase().indexOf(v.toLowerCase())>=0
      ||i.status.toLowerCase().indexOf(v.toLowerCase())>=0
      ||i.period.toLowerCase().indexOf(v.toLowerCase())>=0
      ||new Date(i.dueDate).toLocaleDateString('en-US',{month:'long',year:'numeric'}).toLowerCase().indexOf(v.toLowerCase())>=0;
  });
  var html='';
  filtered.sort(function(a,b){return new Date(b.dueDate)-new Date(a.dueDate);}).forEach(function(inv){
    var isPaidRow=(inv.status==='paid'||inv.autoPay);
    var col=isPaidRow?'var(--green)':inv.status==='unpaid'?'var(--red)':'var(--dim)';
    var statusLabel=isPaidRow?'paid':inv.status;
    var dueStr=new Date(inv.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div style="flex:1">'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px">'+inv.invoiceNum+'</div>'
      +'<div style="font-size:13px;font-weight:500">'+inv.notes+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+inv.period+' &nbsp;&#183;&nbsp; Due '+dueStr+'</div>'
      +(inv.autoPay?'<div style="font-size:9px;color:var(--green);margin-top:3px">&#10003; Auto-Pay</div>':'')
      +(inv.paidDate&&!inv.autoPay?'<div style="font-size:9px;color:var(--green);margin-top:2px">&#10003; Paid'+(inv.paymentMethod?' via '+inv.paymentMethod:'')+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;margin-left:12px">'
      +'<div style="font-family:var(--ff);font-size:22px;color:var(--gl)">$'+inv.amount.toFixed(2)+'</div>'
      +'<div style="font-size:9px;color:'+col+';text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+statusLabel+'</div>'
      +'<div style="font-size:9px;color:var(--dim);margin-top:4px">View &#8250;</div>'
      +'</div></div></div>';

}

var saveCardOn=false;
function toggleSaveCard(){
  saveCardOn=!saveCardOn;
  var tog=document.getElementById('saveCardToggle');
  var thumb=document.getElementById('saveCardThumb');
  var consent=document.getElementById('saveCardConsent');
  if(tog) tog.style.background=saveCardOn?'var(--gold)':'var(--ch)';
  if(thumb) thumb.style.transform=saveCardOn?'translateX(20px)':'none';
  if(thumb) thumb.style.background=saveCardOn?'#000':'var(--dim)';
  if(consent) consent.style.display=saveCardOn?'block':'none';
}

function fmtCC(input){
  var v=input.value.replace(/\D/g,'').substring(0,16);
  input.value=v.replace(/(.{4})/g,'$1 ').trim();
}
function fmtExp(input){
  var v=input.value.replace(/\D/g,'').substring(0,4);
  if(v.length>2) v=v.slice(0,2)+' / '+v.slice(2);
  input.value=v;
}

function copyToClipboard(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){showToast('Copied: '+txt);});}
  else{showToast(txt);}
}

function processCardPayment(invId){
  var num=document.getElementById('ccNum');
  var exp=document.getElementById('ccExp');
  var cvv=document.getElementById('ccCvv');
  if(!num||num.value.replace(/\s/g,'').length<15){showToast('Please enter a valid card number');return;}
  if(!exp||exp.value.length<7){showToast('Please enter your card expiry');return;}
  if(!cvv||cvv.value.length<3){showToast('Please enter your CVV');return;}
  confirmPayment(invId,'Credit Card');
}

function processExpressPay(invId,method){
  confirmPayment(invId,method);
}

function confirmPayment(invId,method){
  // Mark the invoice as paid in our local data
  var inv=clientInvoices.find(function(i){return i.id===invId;});
  if(inv){inv.status='paid';inv.paidDate=new Date();inv.paymentMethod=method;}
  // Show confirmation overlay
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(6px)';
  overlay.innerHTML='<div style="width:70px;height:70px;border-radius:50%;background:rgba(76,175,125,.15);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:32px">✓</div>'
    +'<div style="font-family:var(--ff);font-size:26px;color:var(--gl);letter-spacing:2px">Payment Received</div>'
    +'<div style="font-size:12px;color:var(--dim);text-align:center;line-height:1.8">'+inv.invoiceNum+'<br>'+method+'<br><span style="color:var(--green)">$'+inv.amount.toFixed(2)+' CAD</span></div>'
    +'<button onclick="this.parentNode.remove();openInvoice(\''+invId+'\')" style="margin-top:8px;background:linear-gradient(135deg,var(--gold),var(--gl));border:none;border-radius:1px;color:#000;font-family:Montserrat,sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:13px 32px;cursor:pointer">View Receipt</button>';
  document.body.appendChild(overlay);
}

function printInvoice(){
  var doc=document.getElementById('invoiceDoc');
  if(!doc)return;
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><title>EstateCare Invoice</title>'
    +'<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;color:#1a1a1a;font-family:Georgia,serif;padding:40px;}'
    +'table{width:100%;border-collapse:collapse;}'
    +'</style></head><body>');
  // Build clean print version
  w.document.write('<div style="max-width:700px;margin:0 auto">');
  w.document.write(doc.innerHTML
    .replace(/background:[^;]+;/g,'background:#f9f9f9;')
    .replace(/color:var\(--gl\)/g,'color:#8b6914')
    .replace(/color:var\(--gold\)/g,'color:#8b6914')
    .replace(/color:var\(--dim\)/g,'color:#666')
    .replace(/color:var\(--text\)/g,'color:#1a1a1a')
    .replace(/color:var\(--green\)/g,'color:#2e7d32')
    .replace(/color:var\(--red\)/g,'color:#c62828')
    .replace(/border:[^;]*var\(--border\)[^;]*/g,'border:1px solid #ddd')
    .replace(/border:[^;]*var\(--gold\)[^;]*/g,'border:2px solid #c9a84c')
    .replace(/var\(--ch\)/g,'#ffffff')
    .replace(/var\(--ch2\)/g,'#f5f5f5')
    .replace(/var\(--ch3\)/g,'#eeeeee')
  );
  w.document.write('</div></body></html>');
  w.document.close();
  w.print();
}

function invRow(label,val){
  return '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(201,168,76,0.08)">'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;margin-right:12px">'+label+'</div>'
    +'<div style="font-size:12px;text-align:right">'+val+'</div></div>';
}

function payOption(icon,name,detail,sub){
  return '<div class="card" style="padding:12px;text-align:center;cursor:pointer" data-paymethod="'+name+'" data-action="payopt">'
    +'<div style="font-size:22px;margin-bottom:6px">'+icon+'</div>'
    +'<div style="font-size:11px;font-weight:500;color:var(--text)">'+name+'</div>'
    +'<div style="font-size:9px;color:var(--dim);margin-top:3px">'+detail+'</div>'
    +'<div style="font-size:9px;color:var(--gold);margin-top:2px">'+sub+'</div>'
    +'</div>';
}

function showPayContact(method){
  showToast('Contact us to pay via '+method);
}

function showAutoPayInfo(){
  showToast('Contact hello@myestatecare.ca to set up Auto-Pay');
}

<script>
(function(){
  if(window.navigator.standalone===true) return;
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var isAndroid=/Android/.test(navigator.userAgent);
  if(!isIOS&&!isAndroid) return;
  if(sessionStorage.getItem('pwa_dismissed')) return;
  setTimeout(function(){
    var b=document.getElementById('pwaBanner');
    if(b) b.style.display='block';
  },4000);
})();
function showPWASteps(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var steps=document.getElementById('pwaStepsInner');
  if(!steps) return;
  var s=isIOS
    ?'<div style="font-size:11px;color:var(--text);line-height:2">1. Tap the <b style="color:var(--gold)">Share button</b> <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 22 20 2 20"/></svg> at the bottom of Safari<br>2. Tap <b style="color:var(--gold)">Add to Home Screen</b><br>3. Tap <b style="color:var(--gold)">Add</b></div>'
    :'<div style="font-size:11px;color:var(--text);line-height:2">1. Tap the <b style="color:var(--gold)">three dots menu</b> in Chrome<br>2. Tap <b style="color:var(--gold)">Add to Home Screen</b><br>3. Tap <b style="color:var(--gold)">Add</b></div>';
  steps.innerHTML=s;
  steps.style.display='block';
  var btn=document.getElementById('pwaBanner').querySelector('button');
  if(btn){btn.textContent='Got it!';btn.onclick=dismissPWA;}
}
function dismissPWA(){
  sessionStorage.setItem('pwa_dismissed','1');
  var b=document.getElementById('pwaBanner');
  if(b) b.style.display='none';
}
