    messagingSenderId: "7026276636",
    appId: "1:7026276636:web:2c065fb9028de6f8c562d9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._loadWaitlistFromFirestore = async function(){
    const q = query(collection(db, "waitlist"), orderBy("submittedAt", "desc"));
    const snap = await getDocs(q);
    const out = [];
    snap.forEach(function(doc){
      const d = doc.data();
      out.push({
        id: doc.id,
        email: d.email || '',
        postalCode: d.postalCode || '',
        submittedAt: d.submittedAt ? d.submittedAt.toDate() : null
      });
    });

// ── HELPERS ────────────────────────────────────────────────────────────────
function scoreOf(pts){var g=0,y=0,r=0,t=pts.length;pts.forEach(function(p){if(p.status==='green')g++;else if(p.status==='yellow')y++;else if(p.status==='red')r++;});return{score:t>0?Math.round(((g*2+y)/(t*2))*100):0,green:g,yellow:y,red:r,total:t};}
function liveScore(e){var all=[];Object.values(e.data).forEach(function(c){all=all.concat(c.points);});return scoreOf(all);}

function autoAssign(postal,date){
  var ds=date.toDateString(),loads={};
  inspectors.forEach(function(i){loads[i.id]=0;});
  scheduleItems.forEach(function(s){if(s.date&&s.date.toDateString()===ds&&s.inspectorId)loads[s.inspectorId]=(loads[s.inspectorId]||0)+1;});
  var sorted=inspectors.slice().sort(function(a,b){
    var am=a.postalCode&&postal&&a.postalCode.substring(0,3)===postal.substring(0,3)?0:1;
    var bm=b.postalCode&&postal&&b.postalCode.substring(0,3)===postal.substring(0,3)?0:1;
    if(am!==bm)return am-bm;return(loads[a.id]||0)-(loads[b.id]||0);
  });
  var p=sorted.find(function(i){return(loads[i.id]||0)<8;});
  return p?p.id:(sorted[0]?sorted[0].id:null);
}

function genSchedule(estate){
  if(!estate.contract)return;
  var con=estate.contract,start=new Date(con.startDate),end=new Date(con.endDate);
  scheduleItems=scheduleItems.filter(function(s){return s.estateId!==estate.id;});
  var d=new Date(start),count=0,interval=con.tier==='Basic'?7:con.tier==='Premium'?3.5:3;
  while(d<=end){
    scheduleItems.push({id:estate.id+'_'+count,estateId:estate.id,inspectorId:autoAssign(estate.postalCode,new Date(d)),date:new Date(d),status:d<new Date()?'completed':'scheduled'});
    if(con.tier==='Premium')d.setDate(d.getDate()+(count%2===0?3:4));
    else d.setDate(d.getDate()+Math.round(interval));
    count++;
  }
}

function getByDate(ds){return scheduleItems.filter(function(s){return s.date&&s.date.toDateString()===ds;});}
function getByInsp(id){return scheduleItems.filter(function(s){return s.inspectorId===id;});}
function loadForDate(id,ds){return scheduleItems.filter(function(s){return s.inspectorId===id&&s.date&&s.date.toDateString()===ds;}).length;}

estates.forEach(genSchedule);

    sel.addEventListener('change',function(){reassign(this.getAttribute('data-schedid'),this.value);});
  });

    el.addEventListener('click',function(){

}

  return '<div class="topbar">'+l+'<div class="avatar" data-action="nav" data-fn="doSignOut" title="Sign Out">EC</div></div>';
}

    +'<button class="ni'+(active==='dash'?' active':'')+'" data-action="nav" data-fn="goDash"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Dashboard</button>'
    +'<button class="ni'+(active==='cal'?' active':'')+'" data-action="nav" data-fn="goCal"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>Schedule</button>'
    +'<button class="ni'+(active==='clients'?' active':'')+'" data-action="nav" data-fn="goClients"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Clients</button>'
    +'<button class="ni'+(active==='estates'?' active':'')+'" data-action="nav" data-fn="goEstates"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>Estates</button>'
    +'<button class="ni'+(active==='inspectors'?' active':'')+'" data-action="nav" data-fn="goInspectors"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>Inspectors</button>'
    +'<button class="ni'+(active==='invoices'?' active':'')+'" data-action="nav" data-fn="goInvoices"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>Invoices</button>'
    +'<button class="ni'+(active==='waitlist'?' active':'')+'" data-action="nav" data-fn="goWaitlist"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>Waitlist</button>'

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function goDash(){
  var issues=0;
  estates.forEach(function(e){Object.values(e.data).forEach(function(c){c.points.forEach(function(p){if(p.status==='red'||p.status==='yellow')issues++;});});});
  var value=estates.reduce(function(s,e){return s+(e.contract?e.contract.contractValue:0);},0);
  var today=new Date().toDateString();
  var todayCount=getByDate(today).length;

  var html=topBar('EstateCare','Admin Dashboard')
    +'<div class="sc">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">'
    +statBox('Estates',estates.length,'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>',null,'goEstates()')
    +statBox('Inspectors',inspectors.length,'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',null,'goInspectors()')
    +statBox('Active Issues',issues,'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>','var(--yellow)','goEstates()')
    +statBox('Contract Value','$'+value.toLocaleString('en',{maximumFractionDigits:0}),'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>','var(--green)','goEstates()')
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<div class="sec" style="margin:0">Active Contracts</div>'
    +(todayCount?'<div style="font-size:9px;color:var(--gold);letter-spacing:1px">'+todayCount+' inspections today</div>':'')
    +'</div>';

  estates.forEach(function(e){
    var sc=liveScore(e);
    var con=e.contract;
    var insp=con?inspectors.find(function(i){return i.id===con.assignedInspector;}):null;
    var nextD=con&&con.nextInspection?new Date(con.nextInspection).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'-';
    var completed=e.pastInspections.length+(e.completedAt?1:0);
    var pct=con&&con.totalInspections>0?Math.round(completed/con.totalInspections*100):0;
    html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-family:var(--ff);font-size:17px;color:var(--gl)">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.clientName+' &nbsp;&#183;&nbsp; <span style="color:var(--gold)">'+con.tier+'</span></div></div>'
      +'<div style="font-family:var(--ff);font-size:22px;color:var(--gl)">'+sc.score+'%</div></div>'
      +'<div style="display:flex;gap:16px;margin-bottom:10px">'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px">NEXT<br><span style="color:var(--text);font-size:12px">'+nextD+'</span></div>'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px">INSPECTOR<br><span style="color:var(--text);font-size:12px">'+(insp?insp.name.split(' ')[0]:'—')+'</span></div>'
      +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px">VALUE<br><span style="color:var(--green);font-size:12px">$'+con.contractValue.toLocaleString('en',{maximumFractionDigits:0})+'</span></div>'
      +'</div>'
      +'<div style="font-size:9px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:4px"><span>'+completed+' / '+con.totalInspections+' inspections</span><span>'+pct+'%</span></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+pct+'%"></div></div>'
      +'</div>';
  });
  // Walk-through requests (pending)
  var pendingWalks=estates.filter(function(e){return e.contract&&e.contract.status==='pending'&&e.contract.walkThrough;});
  if(pendingWalks.length){
    html+='<div style="font-size:9px;letter-spacing:3px;color:var(--yellow);text-transform:uppercase;margin:4px 0 12px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Walk-Through Requests ('+pendingWalks.length+')</div>';
    pendingWalks.forEach(function(e){
      var wt=e.contract.walkThrough;
      var dateStr=new Date(wt.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      html+='<div class="card" style="border-color:var(--yellow);margin-bottom:10px">'
        +'<div style="display:flex;align-items:center;gap:12px">'
        +'<div class="cat-ico">'+e.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:13px">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.clientName+'</div>'
        +'<div style="font-size:10px;color:var(--yellow);margin-top:4px">Walk-Through: '+dateStr+' at '+wt.time+'</div></div>'
        +'<div style="font-size:9px;color:var(--yellow);letter-spacing:1px;text-transform:uppercase">Pending</div>'
        +'</div></div>';
    });
  }
  html+='</div>'+nav('dash');
  render(html);
}

function statBox(label,val,icon,color,fn){
  var cls=fn?'card tap':'card';
  var click=fn?' onclick="'+fn+'"':'';
  return '<div class="'+cls+'"'+click+' style="text-align:center;padding:14px">'
    +'<div style="font-size:20px">'+icon+'</div>'
    +'<div style="font-family:var(--ff);font-size:22px;color:'+(color||'var(--gl)')+';margin:4px 0">'+val+'</div>'
    +'<div style="font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase">'+label+'</div>'
    +(fn?'<div style="font-size:9px;color:var(--gold);margin-top:4px">View &#8250;</div>':'')
    +'</div>';
}

// ── SCHEDULE / CALENDAR ───────────────────────────────────────────────────
function goCal(){renderCal(calViewDate);}

function renderCal(vd){
  calViewDate=vd;
  var y=vd.getFullYear(),m=vd.getMonth();
  var mn=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var today=new Date();

  var html=topBar('Schedule','Admin View')
    +'<div class="sc">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button onclick="shiftCal(-1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8249;</button>'
    +'<div style="font-family:var(--ff);font-size:18px;color:var(--gl)">'+mn+'</div>'
    +'<button onclick="shiftCal(1)" style="background:none;border:1px solid var(--border);border-radius:2px;color:var(--gold);padding:8px 14px;cursor:pointer;font-size:18px">&#8250;</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">';
  ['S','M','T','W','T','F','S'].forEach(function(d){html+='<div style="text-align:center;font-size:9px;color:var(--dim);padding:4px">'+d+'</div>';});
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var i=0;i<fd;i++) html+='<div></div>';
  for(var d=1;d<=dim;d++){
    var td=new Date(y,m,d),ds=td.toDateString();
    var items=getByDate(ds);
    var isT=td.toDateString()===today.toDateString();
    var hasR=items.some(function(s){var e=estates.find(function(x){return x.id===s.estateId;});return e&&Object.values(e.data).some(function(c){return c.points.some(function(p){return p.status==='red';});});});
    html+='<div data-action="day" data-date="'+ds+'" style="min-height:46px;background:'+(isT?'rgba(201,168,76,0.15)':'var(--ch2)')+';border:1px solid '+(isT?'var(--gold)':'var(--border)')+';border-radius:2px;padding:4px;cursor:'+(items.length?'pointer':'default')+'">'
      +'<div style="font-size:11px;color:'+(isT?'var(--gold)':'var(--dim)')+'">'+d+'</div>'
      +(items.length?'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px">'+items.slice(0,5).map(function(){return '<div style="width:6px;height:6px;border-radius:50%;background:'+(hasR?'var(--red)':'var(--green)')+'"></div>';}).join('')+(items.length>5?'<span style="font-size:7px;color:var(--dim)">+'+( items.length-5)+'</span>':'')+'</div>':'')
      +'</div>';
  }
  html+='</div>';

  var todayItems=getByDate(today.toDateString());
  if(todayItems.length){
    html+='<div class="sec" style="margin-top:20px">Today — '+todayItems.length+' Inspection'+(todayItems.length>1?'s':'')+'</div>';
    inspectors.forEach(function(insp){
      var mine=todayItems.filter(function(s){return s.inspectorId===insp.id;});
      if(!mine.length)return;
      html+='<div class="card" style="margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:8px">'
        +'<div style="font-size:13px;font-weight:500">'+insp.name+'</div>'
        +'<div style="font-size:9px;color:var(--gold);letter-spacing:1px">'+mine.length+'/8</div></div>';
      mine.forEach(function(s){
        var e=estates.find(function(x){return x.id===s.estateId;});if(!e)return;
        html+='<div style="padding:8px 0;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">'
          +'<div style="flex:1"><div style="font-size:12px">'+e.name+'</div>'
          +'<div style="font-size:10px;color:var(--dim);margin-top:1px">'+e.address+'</div></div>'
          +'<div style="font-size:9px;color:'+(s.status==='completed'?'var(--green)':'var(--dim)')+';text-transform:uppercase;letter-spacing:1px">'+s.status+'</div></div>';
      });
      html+='</div>';
    });
  }
  html+='</div>'+nav('cal');
  render(html);
}

function shiftCal(d){calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+d,1);renderCal(calViewDate);}

function adminDayDetail(dateStr){
  var items=getByDate(dateStr);if(!items.length)return;
  var d=new Date(dateStr);
  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="goCal()">&#8592;</button><div><div class="topbar-title">'+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div><div class="topbar-sub">'+items.length+' Inspection'+(items.length>1?'s':'')+'</div></div></div><div class="avatar">EC</div></div>'
    +'<div class="sc">';
  inspectors.forEach(function(insp){
    var mine=items.filter(function(s){return s.inspectorId===insp.id;});if(!mine.length)return;
    var load=loadForDate(insp.id,dateStr);
    html+='<div class="sec">'+insp.name+' &nbsp;<span style="color:'+(load>=8?'var(--red)':'var(--gold)')+'">'+load+'/8</span></div>';
    mine.forEach(function(s){
      var e=estates.find(function(x){return x.id===s.estateId;});if(!e)return;
      html+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div class="cat-ico">'+e.icon+'</div>'
        +'<div style="flex:1"><div style="font-size:13px">'+e.name+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.address+'</div>'
        +'<div style="font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px">'+e.postalCode+' &nbsp;&#183;&nbsp; '+e.contract.tier+'</div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:9px;color:'+(s.status==='completed'?'var(--green)':'var(--dim)')+';text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">'+s.status+'</div>'
        +'<select data-schedid="'+s.id+'" style="background:var(--ch3);border:1px solid var(--border);color:var(--text);font-size:9px;padding:4px;border-radius:2px">'
        +inspectors.map(function(i){return '<option value="'+i.id+'"'+(s.inspectorId===i.id?' selected':'')+'>'+i.name.split(' ')[0]+'</option>';}).join('')
        +'</select></div></div>';
    });
  });
  html+='</div>';
  render(html);
}

function reassign(schedId,inspId){
  var item=scheduleItems.find(function(s){return s.id===schedId;});
  if(item){item.inspectorId=inspId;showToast('Reassigned');}
}

// ── CLIENTS ───────────────────────────────────────────────────────────────
function goClients(){
  var clients=users.filter(function(u){return u.role==='client';});
  var html=topBar('Clients',clients.length+' Active')
    +'<div class="sc">'
    +'<div style="display:flex;gap:10px;margin-bottom:16px">'
    +'<input id="clientSearch" oninput="filterClients(this.value)" style="flex:1;background:var(--ch2);border:1px solid var(--border);border-radius:1px;color:var(--text);font-family:Montserrat,sans-serif;font-size:16px;padding:10px 14px;outline:none" placeholder="Search clients…">'
    +'<button class="btn-sm" onclick="goAddClient()">+ Add</button>'
    +'</div>'
    +'<div id="clientList">';
  clients.forEach(function(u){
    var myE=estates.filter(function(e){return e.clientEmail===u.email;});
    html+='<div class="card tap" data-action="client" data-id="'+u.email+'" style="display:flex;align-items:center;gap:12px">'
      +'<div class="avatar">'+u.initials+'</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+u.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+u.email+'</div>'
      +'<div style="font-size:10px;color:var(--dim)">'+u.phone+'</div>'
      +'<div style="font-size:9px;color:var(--gold);margin-top:4px;letter-spacing:1px">'+myE.length+' propert'+(myE.length===1?'y':'ies')+'</div>'
      +'</div><div style="color:var(--dim);font-size:18px">&#8250;</div></div>';
  });
  html+='</div></div>'+nav('clients');
  render(html);
}

function filterClients(v){
  var clients=users.filter(function(u){return u.role==='client';});
  var filtered=clients.filter(function(u){
    return u.name.toLowerCase().indexOf(v.toLowerCase())>=0||u.email.toLowerCase().indexOf(v.toLowerCase())>=0||(u.phone&&u.phone.indexOf(v)>=0);
  });
  var html='';
  filtered.forEach(function(u){
    var myE=estates.filter(function(e){return e.clientEmail===u.email;});
    html+='<div class="card tap" data-action="client" data-id="'+u.email+'" style="display:flex;align-items:center;gap:12px">'
      +'<div class="avatar">'+u.initials+'</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:500">'+u.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+u.email+'</div>'
      +'<div style="font-size:9px;color:var(--gold);margin-top:4px;letter-spacing:1px">'+myE.length+' propert'+(myE.length===1?'y':'ies')+'</div>'
      +'</div><div style="color:var(--dim);font-size:18px">&#8250;</div></div>';
  });
  document.getElementById('clientList').innerHTML=html;
}

function goClientDetail(email){
  var u=users.find(function(x){return x.email===email;});if(!u)return;
  var myE=estates.filter(function(e){return e.clientEmail===u.email;});
  var html='<div class="topbar"><div style="display:flex;align-items:center"><button class="back-btn" onclick="goClients()">&#8592;</button><div><div class="topbar-title">'+u.name+'</div><div class="topbar-sub">Client Profile</div></div></div><div class="avatar">'+u.initials+'</div></div>'
    +'<div class="sc"><div class="sec">Contact</div><div class="card">'
    +dr('Email',u.email)+dr('Phone',u.phone||'—')
    +dr('Secondary Contact',(u.secondaryContact||'—')+(u.secondaryPhone?' &nbsp;&#183;&nbsp; '+u.secondaryPhone:''))
    +dr('Secondary Address',u.secondaryAddress||'—')
    +(u.notes?'<div style="padding-top:10px;margin-top:4px;border-top:1px solid var(--border)"><div class="lbl">Notes</div><div style="font-size:12px">'+u.notes+'</div></div>':'')
    +'</div><div class="sec" style="margin-top:4px">Properties ('+myE.length+')</div>';
  myE.forEach(function(e){
    html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="display:flex;align-items:center;gap:12px">'
      +'<div class="cat-ico">'+e.icon+'</div>'
      +'<div style="flex:1"><div style="font-family:var(--ff);font-size:16px;color:var(--gl)">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim)">'+e.address+'</div>'
      +(e.contract?'<div style="font-size:9px;color:var(--gold);margin-top:3px;letter-spacing:1px">'+e.contract.tier+' &nbsp;&#183;&nbsp; $'+e.contract.weeklyRate+'/wk</div>':'')
      +'</div><div style="color:var(--dim);font-size:18px">&#8250;</div></div>';
  });
  html+='</div>';
  render(html);
}

function goAddClient(){
  var html=topBar('Add Client','New Account','goClients')

function saveClient(){
  var name=document.getElementById('ncName').value.trim();
  var email=document.getElementById('ncEmail').value.trim().toLowerCase();
  if(!name||!email){document.getElementById('ncErr').style.display='block';return;}
  var initials=name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  users.push({email:email,password:document.getElementById('ncPass').value.trim()||'test',role:'client',name:name,initials:initials,phone:document.getElementById('ncPhone').value.trim(),secondaryContact:document.getElementById('ncSecName').value.trim(),secondaryPhone:document.getElementById('ncSecPhone').value.trim(),secondaryAddress:document.getElementById('ncSecAddr').value.trim(),notes:document.getElementById('ncNotes').value.trim()});
  showToast('Client added');goClients();
}

      ||e.address.toLowerCase().indexOf(v.toLowerCase())>=0
      ||(e.clientName&&e.clientName.toLowerCase().indexOf(v.toLowerCase())>=0)
      ||(e.postalCode&&e.postalCode.indexOf(v)>=0);
  });
  var html='';
  filtered.forEach(function(e){
    var sc=liveScore(e);var con=e.contract;
    var completed=e.pastInspections.length+(e.completedAt?1:0);
    var pct=con&&con.totalInspections>0?Math.round(completed/con.totalInspections*100):0;
    html+='<div class="card tap" data-action="estate" data-id="'+e.id+'" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'

      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+e.clientName+'</div></div>'
      +'<div style="font-family:var(--ff);font-size:20px;color:var(--gl)">'+sc.score+'%</div></div>'

function onTierChange(){
  var tier=document.getElementById('neTier').value;
  var lux=document.getElementById('luxSection');
  if(lux)lux.style.display=tier==='Luxury'?'block':'none';
  updateCalc();
}

function updateCalc(){
  var start=document.getElementById('neStart').value;
  var ret=document.getElementById('neReturn').value;
  var tier=document.getElementById('neTier').value;
  var cd=document.getElementById('calcDiv');
  if(!start||!ret||!cd)return;
  var sd=new Date(start),rd=new Date(ret),ed=new Date(ret);
  ed.setDate(ed.getDate()-2);
  var days=Math.round((ed-sd)/(86400000));
  if(days<=0){cd.style.display='none';return;}
  var weeks=days/7,rate=tier==='Basic'?49.95:tier==='Premium'?59.95:69.95;
  var insp=tier==='Basic'?Math.round(weeks):tier==='Premium'?Math.round(weeks*2):Math.round(days/3);
  var val=(weeks*rate).toFixed(2);
  var ends=ed.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('calcText').innerHTML='End Date (2 days before return): <b style="color:var(--gl)">'+ends+'</b><br>Contract Weeks: <b style="color:var(--gl)">'+Math.round(weeks*10)/10+'</b><br>Total Inspections: <b style="color:var(--gl)">'+insp+'</b><br>Contract Value: <b style="color:var(--green)">$'+parseFloat(val).toLocaleString()+'</b>';
  cd.style.display='block';
}

  if(!name||!email){document.getElementById('niErr').style.display='block';return;}
  var initials=name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  var id='insp_'+Date.now();
  inspectors.push({id:id,name:name,email:email,phone:document.getElementById('niPhone').value.trim(),initials:initials,postalCode:document.getElementById('niPostal').value.trim(),assignedEstates:[]});
  users.push({email:email,password:document.getElementById('niPass').value.trim()||'test',role:'inspector',name:name,initials:initials});
  showToast('Inspector added');goInspectors();
}

// ── WAITLIST ──────────────────────────────────────────────────────────────
var waitlistCache=null;

function goWaitlist(){
  var html=topBar('Waitlist','Loading…')
    +'<div class="sc" id="waitlistSc">'
    +'<div style="text-align:center;padding:40px 0;color:var(--dim);font-size:11px;letter-spacing:1px">Loading waitlist…</div>'
    +'</div>'+nav('waitlist');
  render(html);

  window._loadWaitlistFromFirestore().then(function(rows){
    waitlistCache=rows;
    renderWaitlist(rows);
  }).catch(function(err){
    console.error('Waitlist load error:',err);
    var sc=document.getElementById('waitlistSc');
    if(sc) sc.innerHTML='<div class="card" style="border-color:var(--red)"><div style="font-size:12px;color:var(--red)">Could not load waitlist.</div><div style="font-size:10px;color:var(--dim);margin-top:6px">'+(err&&err.message?err.message:'')+'</div></div>';
  });
}

function renderWaitlist(rows){
  var topHtml=topBar('Waitlist',rows.length+' Signup'+(rows.length===1?'':'s'));
  var html='<div class="sc">'
    +'<input class="inp" id="waitlistSearch" placeholder="Search email or postal code" oninput="filterWaitlist(this.value)">';

  if(!rows.length){
    html+='<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:12px;color:var(--dim)">No waitlist signups yet.</div></div>';
  } else {
    rows.forEach(function(r){
      var dateStr=r.submittedAt?r.submittedAt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
      html+='<div class="card">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div style="font-size:14px;color:var(--text);font-weight:500">'+r.email+'</div>'
        +'<div style="font-size:11px;color:var(--dim);margin-top:4px">'+(r.postalCode||'—')+'</div></div>'
        +'<div class="pill pill-g">'+dateStr+'</div>'
        +'</div></div>';
    });
  }
  html+='</div>'+nav('waitlist');
  document.getElementById('screen').innerHTML=topHtml+html;
  document.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(){
      var a=this.getAttribute('data-action');
      if(a==='nav'){var fn=this.getAttribute('data-fn');if(fn&&window[fn])window[fn]();}
    });
  });
}

function filterWaitlist(v){
  if(!waitlistCache) return;
  v=v.trim().toLowerCase();
  var filtered=!v?waitlistCache:waitlistCache.filter(function(r){
    return (r.email||'').toLowerCase().indexOf(v)>=0||(r.postalCode||'').toLowerCase().indexOf(v)>=0;
  });
  renderWaitlist(filtered);
  // Restore focus to the search box after re-render
  var sb=document.getElementById('waitlistSearch');
  if(sb){sb.value=v;sb.focus();}
}

// ── SIGN OUT ──────────────────────────────────────────────────────────────
function doSignOut(){localStorage.removeItem('ec_user');var base=window.location.pathname.replace('admin.html','');window.location.href=base+'index.html';}

// ── INIT ──────────────────────────────────────────────────────────────────
goDash();
</script>

<script>
(function(){
  if(window.navigator.standalone===true) return;
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var isAndroid=/Android/.test(navigator.userAgent);
  if(!isIOS&&!isAndroid) return;
  if(sessionStorage.getItem('pwa_dismissed')) return;
  setTimeout(function(){
    var b=document.getElementById('pwaBanner');
    if(b) b.style.display='block';
  },4000);
})();
function showPWASteps(){
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var steps=document.getElementById('pwaStepsInner');
  if(!steps) return;
  var s=isIOS
    ?'<div style="font-size:11px;color:var(--text);line-height:2">1. Tap the <b style="color:var(--gold)">Share button</b> <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 22 20 2 20"/></svg> at the bottom of Safari<br>2. Tap <b style="color:var(--gold)">Add to Home Screen</b><br>3. Tap <b style="color:var(--gold)">Add</b></div>'
    :'<div style="font-size:11px;color:var(--text);line-height:2">1. Tap the <b style="color:var(--gold)">three dots menu</b> in Chrome<br>2. Tap <b style="color:var(--gold)">Add to Home Screen</b><br>3. Tap <b style="color:var(--gold)">Add</b></div>';
  steps.innerHTML=s;
  steps.style.display='block';
  var btn=document.getElementById('pwaBanner').querySelector('button');
  if(btn){btn.textContent='Got it!';btn.onclick=dismissPWA;}
}
function dismissPWA(){
  sessionStorage.setItem('pwa_dismissed','1');
  var b=document.getElementById('pwaBanner');
  if(b) b.style.display='none';
}
</script>
